type: object
properties:
  logLevel:
    type: string
    enum:
      - ERROR
      - WARN
      - INFO
      - DEBUG
      - TRACE
    description: Module log level.
    default: DEBUG
  unifiedSnapshotEnabled:
    type: boolean
    default: true
    description: When false, disables Snapshot/SnapshotContent controllers and unifiedruntime.Sync; DSC reconciler still runs (status only). Maps to env STATE_SNAPSHOTTER_UNIFIED_ENABLED.
  unifiedBootstrapPairs:
    type: string
    default: ""
    description: |
      Static bootstrap GVK list before merge with eligible DSC. Empty = built-in default pairs.
      Literal "empty" (or "none", "dsc-only") = no static bootstrap (DSC-only merge).
      Custom = semicolon-separated pairs "group/version/Kind|group/version/Kind" (snapshot|content).
      Maps to env STATE_SNAPSHOTTER_UNIFIED_BOOTSTRAP_PAIRS.
