type: object
properties:
  logLevel:
    description: Уровень логирования модуля.
  unifiedBootstrapPairs:
    description: Статический bootstrap списка пар GVK до merge с DSC. Пусто/unset — единственная встроенная пара (core Snapshot → SnapshotContent), доменные типы только через eligible DSC; empty/none/dsc-only — вообще без статических пар (чистый DSC-only); иначе кастомная строка (см. англ. описание в config-values).
  snapshotRootOkTtl:
    description: |
      Опциональная длительность TTL для корневого ObjectKeeper (FollowObjectWithTTL) у Snapshot и unified XxxxSnapshot.
      Пусто — в Pod не передаётся env, в контроллере действует встроенный дефолт (сейчас 1m для отладки цепочки TTL; для прода задайте значение явно, например 168h). Иначе строка длительности Go.
