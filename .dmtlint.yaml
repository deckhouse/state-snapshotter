linters-settings:
  module:
    oss:
      disable: true
    exclude-rules:
      license:
        files:
          # Checked-in prebuilt Go binary (release-notes tool); not a source file.
          - hack/generate_release_notes
          # Local dev-only Dockerfiles (gitignored); no license header expected.
          - images/domain-controller/dev/Dockerfile-dev
          - images/state-snapshotter-controller/dev/Dockerfile-dev
  rbac:
    exclude-rules:
      wildcards:
        - kind: ClusterRole
          name: d8:state-snapshotter:controller
        - kind: ClusterRole
          name: d8:state-snapshotter:webhooks
        - kind: ClusterRole
          name: d8:state-snapshotter:capture-namespace
  no-cyrillic:
    exclude-rules:
      directories:
        - hack/
