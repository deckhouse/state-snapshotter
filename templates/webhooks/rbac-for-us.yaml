---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhooks
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhooks")) | nindent 2 }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:webhooks
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhooks")) | nindent 2 }}
rules:
  # Permission to create SubjectAccessReview to check user permissions
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  # Permission to read resources for validation (to check if they exist in the correct namespace)
  # Webhook needs to verify that target resources exist before validating user permissions
  # Only GET is needed - webhook calls Get() for specific resources, not List() or Watch()
  # Keep this allowlist explicit: wildcard resources would also grant direct access
  # to ManifestCheckpointContentChunk payloads.
  # Domain/demo resources are intentionally not listed here: external domain
  # controllers/CSD flow must grant their own validation RBAC.
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - persistentvolumeclaims
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
  # Roles and RoleBindings are part of the core namespace manifest profile,
  # so the webhook may validate them as explicit MCR targets.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - get
  # Note: Discovery API (/api, /apis) is publicly accessible and doesn't require RBAC permissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:webhooks
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhooks")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: webhooks
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:webhooks
  apiGroup: rbac.authorization.k8s.io

