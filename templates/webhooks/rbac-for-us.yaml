---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhooks
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhooks")) | nindent 2 }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:webhooks
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhooks")) | nindent 2 }}
rules:
  # Permission to create SubjectAccessReview to check user permissions
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  # Permission to read resources for validation (to check if they exist in the correct namespace)
  # Webhook needs to verify that target resources exist before validating user permissions
  # Only GET is needed - webhook calls Get() for specific resources, not List() or Watch()
  # Keep this allowlist explicit: a cluster-wide wildcard here would also grant direct access
  # to cluster-scoped ManifestCheckpointContentChunk payloads.
  # Arbitrary (non-allowlisted) namespaced CR targets are NOT covered by this static allowlist; instead the
  # 040-namespace-capture-rbac hook adds this SA to the transient, namespace-scoped capture RoleBinding for
  # the duration of capture, so the webhook can Get them without a standing wildcard grant.
  # Demo inventory (Track D0/D1): MCR validation resolves targets via dynamic client Get().
  # get/list/watch — admission paths beyond a single named Get.
  - apiGroups:
      - sds-unified-snapshots-poc.deckhouse.io
    resources:
      - demovirtualmachines
      - demovirtualdisks
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - persistentvolumeclaims
    verbs:
      - get
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
  # Roles and RoleBindings are part of the core namespace manifest profile,
  # so the webhook may validate them as explicit MCR targets.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - get
  # Note: Discovery API (/api, /apis) is publicly accessible and doesn't require RBAC permissions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:webhooks
  {{- include "helm_lib_module_labels" (list . (dict "app" "webhooks")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: webhooks
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:webhooks
  apiGroup: rbac.authorization.k8s.io

