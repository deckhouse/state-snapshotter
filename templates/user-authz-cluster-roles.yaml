---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: User
  name: d8:user-authz:state-snapshotter:user
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - manifestcapturerequests
  - manifestcheckpoints
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    user-authz.deckhouse.io/access-level: ClusterEditor
  name: d8:user-authz:state-snapshotter:cluster-editor
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - manifestcapturerequests
  - manifestcheckpoints
  verbs:
  - create
  - delete
  - deletecollection
  - patch
  - update
# storage.deckhouse.io unified Snapshot API (cluster editor; mirrors admin-kubeconfig / controller)
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshots
  - snapshotcontents
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshots/status
  - snapshotcontents/status
  verbs:
  - get
  - update
  - patch
