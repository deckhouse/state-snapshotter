{{- /* ConfigMap is created only if user provides custom values via Helm */}}
{{- /* If ConfigMap doesn't exist, controller uses defaults from Go code */}}
{{- if or (and .Values.controller .Values.controller.config .Values.controller.config.maxChunkSizeBytes) (and .Values.controller .Values.controller.config .Values.controller.config.defaultTTL) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: state-snapshotter-config
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
data:
  {{- if and .Values.controller .Values.controller.config .Values.controller.config.maxChunkSizeBytes }}
  maxChunkSizeBytes: {{ .Values.controller.config.maxChunkSizeBytes | quote }}
  {{- end }}
  {{- if and .Values.controller .Values.controller.config .Values.controller.config.defaultTTL }}
  defaultTTL: {{ .Values.controller.config.defaultTTL | quote }}
  {{- end }}
{{- end }}
