---
apiVersion: v1
kind: Secret
metadata:
  name: state-snapshotter-tls-certs
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ .Values.stateSnapshotter.internal.apiServerCert.ca | b64enc | quote }}
  tls.crt: {{ .Values.stateSnapshotter.internal.apiServerCert.crt | b64enc | quote }}
  tls.key: {{ .Values.stateSnapshotter.internal.apiServerCert.key | b64enc | quote }}

