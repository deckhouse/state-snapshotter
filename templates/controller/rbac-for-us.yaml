apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:{{ .Chart.Name }}:controller
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
rules:
# CustomSnapshotDefinition (cluster-scoped; registry reconciler)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["customsnapshotdefinitions"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["customsnapshotdefinitions/status"]
  verbs: ["get", "update", "patch"]

# CustomResourceDefinition (read-only discovery for CSD mapping resolution)
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]

# ManifestCaptureRequest (namespaced)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcapturerequests"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# ManifestCaptureRequest status
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcapturerequests/status"]
  verbs: ["get", "update", "patch"]

# ManifestCheckpoint (cluster-scoped)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpoints"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# ManifestCheckpoint status
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpoints/status"]
  verbs: ["get", "update", "patch"]

# ManifestCheckpointContentChunk (cluster-scoped)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpointcontentchunks"]
  verbs: ["create", "get", "delete"]

# ObjectKeeper (cluster-scoped): controller creates/patches spec (drift/TTL/followRef); never deletes.
# Deletion is Deckhouse ObjectKeeper controller after follow+TTL; then GC removes retained content/MCP.
# No objectkeepers/status: state-snapshotter does not write ObjectKeeper status.
- apiGroups: ["deckhouse.io"]
  resources: ["objectkeepers"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]

# Allow controller-runtime to watch namespaces
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

# Snapshot root capture allowlist (read-only)
- apiGroups: [""]
  resources:
  - "pods"
  - "services"
  - "configmaps"
  - "secrets"
  - "serviceaccounts"
  - "persistentvolumeclaims"
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
  - "deployments"
  - "statefulsets"
  - "daemonsets"
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
  - "jobs"
  - "cronjobs"
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
  - "ingresses"
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
  - "roles"
  - "rolebindings"
  verbs: ["get", "list", "watch"]

# Unified Snapshots RBAC (for XxxxSnapshot roots and common SnapshotContent)
# RBAC is scoped to API group, not to concrete Snapshot kinds
# Adding a new Snapshot kind requires adding its resource name here
# See ADR section 7 (RBAC Strategy) for details
# Note: Kubernetes RBAC does NOT support wildcards in resource names
# We need to list all snapshot resource types explicitly

# storage.deckhouse.io group (Snapshot, SnapshotContent)
- apiGroups: ["storage.deckhouse.io"]
  resources:
  - "snapshots"                    # Snapshot kind
  - "snapshotcontents"            # SnapshotContent kind
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Unified Snapshots status subresources for storage.deckhouse.io
- apiGroups: ["storage.deckhouse.io"]
  resources:
  - "snapshots/status"
  - "snapshotcontents/status"
  verbs: ["get", "update", "patch"]

# VolumeCaptureRequest (storage-foundation): N5 PR-4 ensure/publish/delete per SnapshotContent
- apiGroups: ["storage.deckhouse.io"]
  resources: ["volumecapturerequests"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["storage.deckhouse.io"]
  resources: ["volumecapturerequests/status"]
  verbs: ["get", "update", "patch"]

# VolumeSnapshotContent handoff after VCR publish (ownerRef -> SnapshotContent)
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshotcontents"]
  verbs: ["get", "list", "watch", "update", "patch"]

# TODO(remove): эти demo-домен RBAC здесь быть НЕ должно. Статический RBAC контроллера
# должен оставаться domain-agnostic; domain/custom-resource права (demo.* и любые
# доменные CSD) обязан выдавать внешний Deckhouse RBAC controller/hook и сигнализировать
# их готовность через CSD condition RBACReady=True. Сейчас права зашиты статически в обход
# этой модели — это временно. Удалить после внедрения внешнего RBAC-hook'а.
# Demo domain (dedicated Demo*Snapshot reconcilers; not generic binder). Required for MCR/MCP on child nodes.
# Do not rely on ad-hoc smoke ClusterRoles (e.g. state-snapshotter-smoke-demo-domain-rbac) in production.
- apiGroups: ["demo.state-snapshotter.deckhouse.io"]
  resources:
  - demovirtualmachines
  - demovirtualdisks
  - demovirtualmachinesnapshots
  - demovirtualdisksnapshots
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["demo.state-snapshotter.deckhouse.io"]
  resources:
  - demovirtualmachinesnapshots/status
  - demovirtualdisksnapshots/status
  verbs: ["get", "update", "patch"]
- apiGroups: ["demo.state-snapshotter.deckhouse.io"]
  resources:
  - demovirtualmachinesnapshots/finalizers
  - demovirtualdisksnapshots/finalizers
  verbs: ["update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controller-leader-election
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Allow controller to create Events in its namespace
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller-leader-election
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: controller-leader-election
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: d8-{{ .Chart.Name }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:controller
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:controller
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: d8-{{ .Chart.Name }}