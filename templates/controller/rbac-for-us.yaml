apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:{{ .Chart.Name }}:controller
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
rules:
# DomainSpecificSnapshotController (cluster-scoped; registry reconciler)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["domainspecificsnapshotcontrollers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["domainspecificsnapshotcontrollers/status"]
  verbs: ["get", "update", "patch"]

# CustomResourceDefinition (read-only discovery for DSC mapping resolution)
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]

# ManifestCaptureRequest (namespaced)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcapturerequests"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# ManifestCaptureRequest status
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcapturerequests/status"]
  verbs: ["get", "update", "patch"]

# ManifestCheckpoint (cluster-scoped)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpoints"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# ManifestCheckpoint status
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpoints/status"]
  verbs: ["get", "update", "patch"]

# ManifestCheckpointContentChunk (cluster-scoped)
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpointcontentchunks"]
  verbs: ["create", "get", "list", "watch", "delete"]

# ObjectKeeper (cluster-scoped) - created by this controller for lifecycle management
# ObjectKeeper is used in FollowObject mode to manage ManifestCheckpoint lifecycle
# Watch permission is needed because controller-runtime creates informer for all types in scheme
- apiGroups: ["deckhouse.io"]
  resources: ["objectkeepers"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]

# Allow controller-runtime to watch namespaces
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

# NamespaceSnapshot root capture allowlist (read-only)
- apiGroups: [""]
  resources:
  - "pods"
  - "services"
  - "configmaps"
  - "secrets"
  - "serviceaccounts"
  - "persistentvolumeclaims"
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
  - "deployments"
  - "statefulsets"
  - "daemonsets"
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
  - "jobs"
  - "cronjobs"
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
  - "ingresses"
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
  - "roles"
  - "rolebindings"
  verbs: ["get", "list", "watch"]

# API Server permissions (for /manifests subresource)
# Only 'get' permission needed - no list/watch (no informer cache)
# TODO: Remove access to manifestcheckpointcontentchunks - move archive assembly to controller
# Currently API server assembles JSON from chunks directly (archive_service.go:257)
# This requires 'get' permission. According to ADR, API server should NOT have access to chunks.
# Future: Move archive assembly logic to ManifestCheckpointController, store assembled archive
# in checkpoint.Status or as a separate resource, so API server only needs to read the final result.
- apiGroups: ["state-snapshotter.deckhouse.io"]
  resources: ["manifestcheckpointcontentchunks"]
  verbs: ["get"]  # Only 'get' by name - no list/watch needed (no informer cache)

# Unified Snapshots RBAC (for XxxxSnapshot / XxxxSnapshotContent resources)
# RBAC is scoped to API group, not to concrete Snapshot kinds
# Adding a new Snapshot kind requires adding its resource name here
# See ADR section 7 (RBAC Strategy) for details
# Note: Kubernetes RBAC does NOT support wildcards in resource names
# We need to list all snapshot resource types explicitly

# storage.deckhouse.io group (Snapshot, SnapshotContent, NamespaceSnapshot, NamespaceSnapshotContent)
- apiGroups: ["storage.deckhouse.io"]
  resources:
  - "snapshots"                    # Snapshot kind
  - "snapshotcontents"            # SnapshotContent kind
  - "namespacesnapshots"          # NamespaceSnapshot kind
  - "namespacesnapshotcontents"   # NamespaceSnapshotContent kind
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Unified Snapshots status subresources for storage.deckhouse.io
- apiGroups: ["storage.deckhouse.io"]
  resources:
  - "snapshots/status"
  - "snapshotcontents/status"
  - "namespacesnapshots/status"
  - "namespacesnapshotcontents/status"
  verbs: ["get", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controller-leader-election
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Allow controller to create Events in its namespace
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controller-leader-election
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: controller-leader-election
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: d8-{{ .Chart.Name }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:controller
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:controller
subjects:
  - kind: ServiceAccount
    name: controller
    namespace: d8-{{ .Chart.Name }}