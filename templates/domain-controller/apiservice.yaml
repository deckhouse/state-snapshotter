{{- if and .Values.stateSnapshotter.enableDemoDomain .Values.stateSnapshotter.internal.domainApiServerCert.ca }}
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.subresources.demo.state-snapshotter.deckhouse.io
  {{- include "helm_lib_module_labels" (list . (dict "app" "domain-controller")) | nindent 2 }}
spec:
  caBundle: {{ .Values.stateSnapshotter.internal.domainApiServerCert.ca | b64enc | quote }}
  group: subresources.demo.state-snapshotter.deckhouse.io
  {{/*
    The domain subresources group is distinct from the demo CRD group
    (demo.state-snapshotter.deckhouse.io) and from core's own aggregated group
    (subresources.state-snapshotter.deckhouse.io): a Kubernetes APIService maps one group/version to one
    backing Service, so the domain controller owns its own group. A lower priority keeps the main demo CRD
    group preferred, mirroring core's apiservice.
  */}}
  groupPriorityMinimum: 999
  service:
    name: domain-controller
    namespace: d8-{{ .Chart.Name }}
    port: 443
  version: v1alpha1
  versionPriority: 15
{{- end }}
