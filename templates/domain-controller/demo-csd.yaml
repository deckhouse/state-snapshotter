{{- if .Values.stateSnapshotter.enableDemoDomain }}
# Reference demo CustomSnapshotDefinition shipped with the module and applied by Deckhouse. It teaches the
# core CSD registry the demo snapshot graph and drives the 030-domain-rbac hook. Contract per the
# separate-binary design: ONLY snapshotResourceMapping[] — no manifestTransformation / serviceRef (the
# domain restore mutation runs in-process in the domain aggregated apiserver, not via a transformer
# service).
apiVersion: state-snapshotter.deckhouse.io/v1alpha1
kind: CustomSnapshotDefinition
metadata:
  name: demo-virtual-machine-disk
  {{- include "helm_lib_module_labels" (list . (dict "app" "domain-controller")) | nindent 2 }}
spec:
  snapshotResourceMapping:
    - source:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualMachine
      snapshot:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualMachineSnapshot
      priority: 100
    - source:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualDisk
      snapshot:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualDiskSnapshot
      priority: 10
{{- end }}
