apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:use:role:admin:state-snapshotter
  labels:
    heritage: deckhouse
    module: state-snapshotter
    rbac.deckhouse.io/kind: use
    rbac.deckhouse.io/aggregate-to-state-snapshotter-as: superadmin
    rbac.deckhouse.io/aggregate-to-all-as: admin
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: use
        rbac.deckhouse.io/aggregate-to-state-snapshotter-as: admin
rules: []
