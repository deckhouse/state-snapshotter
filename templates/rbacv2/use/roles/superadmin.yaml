apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:use:state-snapshotter:superadmin
  labels:
    heritage: deckhouse
    module: state-snapshotter
    rbac.deckhouse.io/kind: use
    rbac.deckhouse.io/aggregate-to-role: superadmin
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: use
        rbac.deckhouse.io/aggregate-to-state-snapshotter-as: superadmin
rules: []
