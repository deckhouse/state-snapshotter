apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: state-snapshotter
    rbac.deckhouse.io/aggregate-to-storage-as: manager
    rbac.deckhouse.io/kind: use
  name: d8:use:capability:state-snapshotter:manage_resources
rules:
  - apiGroups:
      - state-snapshotter.deckhouse.io
    resources:
      - manifestcapturerequests
    verbs:
      - create
      - update
      - patch
      - delete
      - deletecollection
