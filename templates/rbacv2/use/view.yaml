apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: state-snapshotter
    rbac.deckhouse.io/aggregate-to-kubernetes-as: viewer
    rbac.deckhouse.io/kind: use
  name: d8:use:capability:module:state-snapshotter:view
rules:
  - apiGroups:
      - state-snapshotter.deckhouse.io
    resources:
      - manifestcapturerequests
    verbs:
      - get
      - list
      - watch
