---
# Admin-kubeconfig ClusterRole: manual kubectl / demo-e2e (NOT controller SA).
# - Create/read/delete Snapshots; patch Snapshot/SnapshotContent status for demo graph wiring (merge_child_graph_into_root).
# - Read aggregated manifests subresources.
# - Read-only MCR/MCP/ObjectKeeper for diagnostics.
# - Do NOT grant objectkeepers patch/update (forced TTL uses demo-e2e temp RBAC or cluster-admin).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:state-snapshotter:admin-kubeconfig
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - manifestcapturerequests
  - manifestcheckpoints
  verbs:
  - get
  - list
  - watch
# Chunk payloads are controller-internal only: admin/manual paths MUST download via the aggregated
# /manifests subresources below, never by reading the raw chunk objects directly.
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshots
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshots/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshotcontents
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshotcontents/status
  verbs:
  - get
  - patch
  - update
# Aggregated manifest read subresources. Includes per-domain-snapshot routes so a
# subtree can be downloaded by a domain snapshot name (e.g. demovirtualmachinesnapshots/<vm>/manifests
# returns the VM node + its whole subtree). These demo domain subresources belong here
# (admin-kubeconfig/demo role), NOT in the controller SA production RBAC.
- apiGroups:
  - subresources.state-snapshotter.deckhouse.io
  resources:
  - snapshots/manifests
  - snapshots/manifests-with-data-restoration
  # snapshots/index is the machine-readable hierarchy the export download reads to
  # discover per-node manifests/data (d8 snapshot export download).
  - snapshots/index
  - manifestcheckpoints/manifests
  - demovirtualmachinesnapshots/manifests
  - demovirtualdisksnapshots/manifests
  verbs:
  - get
# SnapshotExport / SnapshotImport are user-facing orchestration CRs created and
# deleted by the d8 snapshot export/import CLI.
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshotexports
  - snapshotimports
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - storage.deckhouse.io
  resources:
  - snapshotexports/status
  - snapshotimports/status
  verbs:
  - get
# Import upload subresources: the CLI POST/PUT/HEADs index + per-node manifests
# through the aggregated apiserver (POST->create, PUT->update, GET/HEAD->get).
- apiGroups:
  - subresources.state-snapshotter.deckhouse.io
  resources:
  - snapshotimports/index
  - snapshotimports/manifests
  verbs:
  - get
  - create
  - update
# Data-pod authorization: storage-volume-data-manager's data-exporter authorizes
# data transfer with a SubjectAccessReview for `create` on the download subresource
# of dataexports (export) / dataimports (import) in the resource namespace. This is
# the functional grant (the CRD does not declare a `download` subresource).
- apiGroups:
  - storage.deckhouse.io
  resources:
  - dataexports/download
  - dataimports/download
  verbs:
  - create
- apiGroups:
  - deckhouse.io
  resources:
  - objectkeepers
  verbs:
  - get
  - list
  - watch
# Demo domain inventory + generated child snapshots (live demo / pre-e2e manual kubectl).
- apiGroups:
  - demo.state-snapshotter.deckhouse.io
  resources:
  - demovirtualmachines
  - demovirtualdisks
  - demovirtualmachinesnapshots
  - demovirtualdisksnapshots
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - customsnapshotdefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - customsnapshotdefinitions/status
  verbs:
  - get
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:state-snapshotter:admin-kubeconfig
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:state-snapshotter:admin-kubeconfig
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: kubeadm:cluster-admins
