---
# Admin-kubeconfig ClusterRole: manual kubectl / demo-e2e (NOT controller SA).
# - Create/read/delete Snapshots; patch Snapshot/SnapshotContent status for demo graph wiring (merge_child_graph_into_root).
# - Read per-CR manifest subresources (manifests-download / manifests-with-data-restoration).
# - Read-only MCR/MCP/ObjectKeeper for diagnostics.
# - Do NOT grant objectkeepers patch/update (forced TTL uses demo-e2e temp RBAC or cluster-admin).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:state-snapshotter:admin-kubeconfig
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
rules:
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - manifestcapturerequests
  - manifestcheckpoints
  verbs:
  - get
  - list
  - watch
# Chunk payloads are controller-internal only: admin/manual paths MUST download via the per-CR
# /manifests-download subresources below, never by reading the raw chunk objects directly.
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - snapshots
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - snapshots/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - snapshotcontents
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - snapshotcontents/status
  verbs:
  - get
  - patch
  - update
# Per-CR manifest read subresources. The whole-subtree /manifests aggregation was removed in C9: export
# now walks the tree client-side and downloads each node's own manifests via /manifests-download.
# The core group serves manifests-download / manifests-with-data-restoration ONLY for the core Snapshot
# kind; domain snapshot kinds are addressed through their own aggregated group (see the demo group grant
# below). manifestcheckpoints/manifests is the raw single-checkpoint read served directly by the archive handler.
- apiGroups:
  - subresources.state-snapshotter.deckhouse.io
  resources:
  - snapshots/manifests-download
  - snapshots/manifests-with-data-restoration
  - manifestcheckpoints/manifests
  verbs:
  - get
# Demo domain aggregated group: a domain snapshot node is exported (manifests-download, a proxy to the
# cluster-scoped content download), imported (manifests-and-children-refs-upload, the bind-first domain
# facade that writes childRefs on its own CR and forwards manifests to the cluster-scoped content layer),
# and restored (manifests-with-data-restoration) through its OWN group, not the core group. The core group
# serves these subresources ONLY for the core Snapshot kind — never for domain GVR (→ 404). These demo
# subresources belong here (admin-kubeconfig/demo role), NOT in the controller SA production RBAC.
- apiGroups:
  - subresources.sds-unified-snapshots-poc.deckhouse.io
  resources:
  - demovirtualmachinesnapshots/manifests-download
  - demovirtualdisksnapshots/manifests-download
  verbs:
  - get
- apiGroups:
  - subresources.sds-unified-snapshots-poc.deckhouse.io
  resources:
  - demovirtualmachinesnapshots/manifests-and-children-refs-upload
  - demovirtualdisksnapshots/manifests-and-children-refs-upload
  verbs:
  - create
# C8 connector over the generic-PVC extended VolumeSnapshot (subresources.snapshot.storage.k8s.io):
# user-facing capability to export (manifests-download), restore (manifests-with-data-restoration), and
# import (manifests-and-children-refs-upload) a single volume snapshot by namespaced VS name.
- apiGroups:
  - subresources.snapshot.storage.k8s.io
  resources:
  - volumesnapshots/manifests-download
  - volumesnapshots/manifests-with-data-restoration
  verbs:
  - get
- apiGroups:
  - subresources.snapshot.storage.k8s.io
  resources:
  - volumesnapshots/manifests-and-children-refs-upload
  verbs:
  - create
- apiGroups:
  - deckhouse.io
  resources:
  - objectkeepers
  verbs:
  - get
  - list
  - watch
# Demo domain inventory + generated child snapshots (live demo / pre-e2e manual kubectl).
- apiGroups:
  - sds-unified-snapshots-poc.deckhouse.io
  resources:
  - demovirtualmachines
  - demovirtualdisks
  - demovirtualmachinesnapshots
  - demovirtualdisksnapshots
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - customsnapshotdefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - state-snapshotter.deckhouse.io
  resources:
  - customsnapshotdefinitions/status
  verbs:
  - get
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:state-snapshotter:admin-kubeconfig
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: d8:state-snapshotter:admin-kubeconfig
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: kubeadm:cluster-admins
