# Full-stack demo: manifests + volume data download test
# Namespace: snapshot-demo-full
#
# Что создаётся:
#   - Namespace snapshot-demo-full
#   - ConfigMap demo-cm (в манифестах)
#   - DemoVirtualMachine vm-1 → будет дочерний DemoVirtualMachineSnapshot
#   - DemoVirtualDisk disk-standalone → будет дочерний DemoVirtualDiskSnapshot
#   - PVC demo-pvc (StorageClass: e2e-local-sc-thin, 1Gi) → snapshot через VS/VSC → dataRefs
#   - Job write-demo-data → записывает тестовые данные в PVC
#   - VolumeSnapshot demo-vs → снэпшот PVC (создаётся вручную ПОСЛЕ готовности Job)
#   - CustomSnapshotDefinition demo-live-vm-disk (кластерный)
#   - Snapshot demo-snap
#
# Порядок применения:
#   1. kubectl apply -f snapshot-demo-full.yaml
#   2. kubectl wait --for=condition=Complete job/write-demo-data -n snapshot-demo-full --timeout=120s
#   3. kubectl apply -f snapshot-demo-vs.yaml   (отдельный файл с VolumeSnapshot)
#   4. kubectl wait --for=jsonpath='{.status.readyToUse}'=true vs/demo-vs -n snapshot-demo-full --timeout=120s
#   5. Вручную патчим SnapshotContent (см. TESTING.md)
#   6. d8 snapshot download snapshot-demo-full demo-snap -o /tmp/demo-full --fresh --manifests=false
---
apiVersion: v1
kind: Namespace
metadata:
  name: snapshot-demo-full
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-cm
  namespace: snapshot-demo-full
data:
  demo: tree
  hello: "snapshot-demo-full test"
---
apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
kind: DemoVirtualMachine
metadata:
  name: vm-1
  namespace: snapshot-demo-full
spec: {}
---
apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
kind: DemoVirtualDisk
metadata:
  name: disk-standalone
  namespace: snapshot-demo-full
spec: {}
---
# PVC с реальными данными для тестирования скачивания томов.
# e2e-local-sc-thin → local.csi.storage.deckhouse.io, VolumeBindingMode: WaitForFirstConsumer.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-pvc
  namespace: snapshot-demo-full
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: e2e-local-sc-thin
  resources:
    requests:
      storage: 1Gi
---
# Job записывает тестовые данные в PVC.
# WaitForFirstConsumer: PVC привязывается только когда Pod/Job планируется на ноду.
apiVersion: batch/v1
kind: Job
metadata:
  name: write-demo-data
  namespace: snapshot-demo-full
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: write
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "snapshot-demo-full: hello from volume data test" > /data/hello.txt
              dd if=/dev/urandom bs=1M count=2 of=/data/random.bin 2>/dev/null
              echo "files:" >> /data/hello.txt
              ls -lh /data/ >> /data/hello.txt
              echo "done: $(date)" >> /data/hello.txt
              cat /data/hello.txt
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-pvc
---
# CustomSnapshotDefinition: регистрирует demo-домен.
# Кластерный ресурс — идемпотентен если уже существует.
apiVersion: state-snapshotter.deckhouse.io/v1alpha1
kind: CustomSnapshotDefinition
metadata:
  name: demo-live-vm-disk
spec:
  ownerModule: live-demo
  snapshotResourceMapping:
    - source:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualMachine
      snapshot:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualMachineSnapshot
    - source:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualDisk
      snapshot:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualDiskSnapshot
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: Snapshot
metadata:
  name: demo-snap
  namespace: snapshot-demo-full
spec: {}
