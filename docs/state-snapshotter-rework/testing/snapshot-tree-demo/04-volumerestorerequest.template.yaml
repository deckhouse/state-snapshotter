# VolumeRestoreRequest (storage-foundation production CRD).
# Used for the single "restore" moment of the demo. sourceRef.name is the
# VolumeSnapshotContent taken from SnapshotContent.status.data.artifact.name.
# The restore target PVC is created from pvcTemplate; its namespace is implicit
# = metadata.namespace (restore is never cross-namespace).
# Render with envsubst before applying:
#   export VSC_NAME=<vsc-from-status-data>
#   export STORAGE_CLASS=local-thin
#   envsubst < 04-volumerestorerequest.template.yaml | kubectl apply -f -
apiVersion: storage-foundation.deckhouse.io/v1alpha1
kind: VolumeRestoreRequest
metadata:
  name: restore-demo
  namespace: snapshot-demo-tree
spec:
  sourceRef:
    kind: VolumeSnapshotContent
    name: ${VSC_NAME}
  pvcTemplate:
    metadata:
      name: demo-pvc-restored
    spec:
      storageClassName: ${STORAGE_CLASS}
