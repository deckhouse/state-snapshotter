# Source objects for the snapshot-tree demo.
# Namespace + ConfigMap (manifest leg) + PVC & bind Pod (data leg) +
# demo-domain inventory roots: one VM and one standalone Disk.
#
# The owned Disk (disk-vm, ownerRef -> vm-1) is applied separately in the
# runbook because it needs vm-1 UID at apply time.
apiVersion: v1
kind: Namespace
metadata:
  name: snapshot-demo-tree
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-snapshot-cm
  namespace: snapshot-demo-tree
data:
  demo: tree
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-pvc
  namespace: snapshot-demo-tree
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-thin
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: bind-demo-pvc
  namespace: snapshot-demo-tree
spec:
  restartPolicy: Never
  containers:
    - name: hold
      image: registry.k8s.io/pause:3.9
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: demo-pvc
---
apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
kind: DemoVirtualMachine
metadata:
  name: vm-1
  namespace: snapshot-demo-tree
spec: {}
---
apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
kind: DemoVirtualDisk
metadata:
  name: disk-standalone
  namespace: snapshot-demo-tree
spec: {}
