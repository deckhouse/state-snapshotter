# CustomSnapshotDefinition: teaches the controller how to build child snapshots
# for the demo domain. With this registered, a root Snapshot of the namespace
# automatically produces a snapshot tree:
#   root Snapshot
#     └─ DemoVirtualMachineSnapshot (vm-1)
#          └─ DemoVirtualDiskSnapshot (disk-vm)   # owned disk
#     └─ DemoVirtualDiskSnapshot (disk-standalone) # standalone disk
apiVersion: state-snapshotter.deckhouse.io/v1alpha1
kind: CustomSnapshotDefinition
metadata:
  name: demo-live-vm-disk
spec:
  snapshotResourceMapping:
    - source:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualMachine
      snapshot:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualMachineSnapshot
      priority: 10
    - source:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualDisk
      snapshot:
        apiVersion: demo.state-snapshotter.deckhouse.io/v1alpha1
        kind: DemoVirtualDiskSnapshot
      priority: 100
