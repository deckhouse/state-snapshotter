spec:
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: 'CustomSnapshotDefinition registers custom snapshot types for platform modules.

          See ADR: snapshot-rework/2026-01-23-unified-snapshots-registry.md'
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.

              Servers should convert recognized schemas to the latest internal value, and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.

              Servers may infer this from the endpoint the client submits requests to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
          spec:
            description: 'CustomSnapshotDefinitionSpec maps one source resource GVK to the snapshot GVK
              that materializes it.

              One CSD registers exactly one snapshot kind (flat schema): the snapshot apiVersion/kind
              live at the

              top level, the domain resource being snapshotted is referenced by Source.'
            properties:
              apiVersion:
                description: APIVersion is the apiVersion of the snapshot resource that materializes Source.
              dataBacked:
                description: 'DataBacked marks that this snapshot kind carries a volume data leg: the
                  generic controller must

                  wait for the data artifact (capture) or the matching DataImport (import). Manifest-only
                  snapshot

                  kinds (no volume data) set false.'
              kind:
                description: Kind is the kind of the snapshot resource that materializes Source.
              priority:
                description: Priority orders universal traversal across snapshot kinds. Higher values
                  run first.
              source:
                description: Source is the GVK of the domain resource being snapshotted.
          status:
            properties:
              conditions:
                description: Conditions include Accepted, RBACReady, Ready (see ADR).
                items:
                  description: Condition contains details for one aspect of the current state of this
                    API Resource.
                  properties:
                    lastTransitionTime:
                      description: 'lastTransitionTime is the last time the condition transitioned from
                        one status to another.

                        This should be when the underlying condition changed.  If that is not known, then
                        using the time when the API field changed is acceptable.'
                    message:
                      description: 'message is a human readable message indicating details about the transition.

                        This may be an empty string.'
                    observedGeneration:
                      description: 'observedGeneration represents the .metadata.generation that the condition
                        was set based upon.

                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date

                        with respect to the current state of the instance.'
                    reason:
                      description: 'reason contains a programmatic identifier indicating the reason for
                        the condition''s last transition.

                        Producers of specific condition types may define expected values and meanings
                        for this field,

                        and whether the values are considered a guaranteed API.

                        The value should be a CamelCase string.

                        This field may not be empty.'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
