---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: snapshotimports.storage.deckhouse.io
spec:
  group: storage.deckhouse.io
  names:
    kind: SnapshotImport
    listKind: SnapshotImportList
    plural: snapshotimports
    shortNames:
    - snapimp
    singular: snapshotimport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.snapshotName
      name: Snapshot
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.ttl
      name: TTL
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SnapshotImport orchestrates uploading (importing) a whole Snapshot hierarchy.

          It is a namespaced, user-facing resource. The controller publishes upload endpoints for the
          index, the whole-tree manifests and per-data-snapshot volume data; it populates a PVC per data
          snapshot via DataImport, captures each PVC into a durable VolumeSnapshotContent via
          VolumeCaptureRequest, then pre-provisions the cluster-scoped SnapshotContent tree and the
          statically-bound snapshot CRs. All intermediate objects live in this namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              publish:
                description: Publish exposes upload endpoints outside the cluster
                  (Ingress/Route) when true.
                type: boolean
              snapshotName:
                description: SnapshotName is the desired name of the root Snapshot
                  to (re)create on import (same namespace).
                minLength: 1
                type: string
              storageClassMapping:
                additionalProperties:
                  type: string
                description: |-
                  StorageClassMapping optionally remaps source StorageClass names (from the index) to target
                  StorageClass names. Sources not present in the map are looked up by identity in the cluster.
                type: object
              ttl:
                description: |-
                  TTL is the idle time-to-live for the import's upload endpoints, propagated verbatim to each child
                  DataImport. The countdown is reset by active uploads (enforced in the SVDM pod). If a data node's
                  DataImport idles out before its upload finishes, the import becomes terminal (Ready=False,
                  reason=Expired) and its heavy children are freed. Required. Format: <h><m><s>, e.g. "2h45m".
                minLength: 1
                pattern: ^([0-9]+(\.[0-9]+)?h)?([0-9]+(\.[0-9]+)?m)?([0-9]+s)?$
                type: string
            required:
            - snapshotName
            - ttl
            type: object
          status:
            properties:
              conditions:
                description: Conditions represent the latest observations (IndexReceived,
                  UploadsPrepared, Captured, Ready).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dataSnapshots:
                description: |-
                  DataSnapshots lists per-data-snapshot upload endpoints, prepared once the index is received
                  and all target StorageClasses are resolved.
                items:
                  description: SnapshotImportDataEntry is one data snapshot's upload
                    endpoint and capture progress.
                  properties:
                    capturedSnapshotContentName:
                      description: |-
                        CapturedSnapshotContentName is the durable VolumeSnapshotContent captured from the populated
                        PVC (via VolumeCaptureRequest), referenced from the recreated SnapshotContent.dataRefs[].
                      type: string
                    snapshotID:
                      description: SnapshotID is the stable archive identifier "<kind>--<namespace>--<name>"
                        from the index.
                      minLength: 1
                      type: string
                    uploadCA:
                      description: |-
                        UploadCA is the base64-encoded PEM CA bundle to trust when uploading to the internal UploadURL.
                        It is empty for a published (externally-trusted) endpoint.
                      type: string
                    uploadReady:
                      description: UploadReady indicates the populating PVC + importer
                        endpoint are ready to receive data.
                      type: boolean
                    uploadURL:
                      description: UploadURL is the endpoint to upload this snapshot's
                        volume data (set when UploadReady).
                      type: string
                    uploaded:
                      description: Uploaded indicates the client signalled completion
                        of this data upload.
                      type: boolean
                  required:
                  - snapshotID
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - snapshotID
                x-kubernetes-list-type: map
              indexUploadURL:
                description: IndexUploadURL is where the client uploads the hierarchy
                  index (available immediately).
                type: string
              manifestsUploadURL:
                description: ManifestsUploadURL is where the client uploads the whole-tree
                  manifests archive.
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled
                  into this status.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
