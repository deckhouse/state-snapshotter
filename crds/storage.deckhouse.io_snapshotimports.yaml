---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: snapshotimports.storage.deckhouse.io
spec:
  group: storage.deckhouse.io
  names:
    kind: SnapshotImport
    listKind: SnapshotImportList
    plural: snapshotimports
    shortNames:
    - snapimp
    singular: snapshotimport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetName
      name: Target
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.ttl
      name: TTL
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SnapshotImport orchestrates uploading (importing) a whole Snapshot hierarchy.

          It is a namespaced, user-facing resource. The controller publishes upload endpoints for the
          index, the whole-tree manifests and per-data-snapshot volume data; it populates a PVC per data
          snapshot via DataImport, captures each PVC into a durable VolumeSnapshotContent via
          VolumeCaptureRequest, then pre-provisions the cluster-scoped SnapshotContent tree and the
          statically-bound snapshot CRs. All intermediate objects live in this namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              childSnapshot:
                description: |-
                  ChildSnapshot optionally selects a single child snapshot from the uploaded bundle to import as
                  the new root (server-side re-root). Empty (the default) imports the bundle's own root. When set,
                  apiVersion, kind and name must all match a node present in the uploaded bundle exactly (this is
                  an exact match, not label selection).
                properties:
                  apiVersion:
                    description: |-
                      APIVersion of the referenced snapshot (e.g. "storage.deckhouse.io/v1alpha1"). Empty defaults to
                      the namespaced root Snapshot apiVersion.
                    type: string
                  kind:
                    description: |-
                      Kind of the referenced snapshot (e.g. "Snapshot", "DemoVirtualMachineSnapshot"). Empty defaults
                      to "Snapshot".
                    type: string
                  name:
                    description: Name of the referenced snapshot.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              publish:
                description: Publish exposes upload endpoints outside the cluster
                  (Ingress/Route) when true.
                type: boolean
              storageClassMapping:
                additionalProperties:
                  type: string
                description: |-
                  StorageClassMapping optionally remaps source StorageClass names (from the index) to target
                  StorageClass names. Sources not present in the map are looked up by identity in the cluster.
                type: object
              targetName:
                description: |-
                  TargetName is the desired name of the recreated root snapshot in this namespace. When
                  ChildSnapshot is empty it names the recreated root of the uploaded bundle; when ChildSnapshot
                  selects a child, it names that re-rooted child.
                minLength: 1
                type: string
              ttl:
                description: |-
                  TTL is the idle time-to-live for the import's upload endpoints, propagated verbatim to each child
                  DataImport. The countdown is reset by active uploads (enforced in the SVDM pod). If a data node's
                  DataImport idles out before its upload finishes, the import becomes terminal (Ready=False,
                  reason=Expired) and its heavy children are freed. Required. Format: <h><m><s>, e.g. "2h45m".
                minLength: 1
                pattern: ^([0-9]+(\.[0-9]+)?h)?([0-9]+(\.[0-9]+)?m)?([0-9]+s)?$
                type: string
            required:
            - targetName
            - ttl
            type: object
          status:
            properties:
              conditions:
                description: Conditions represent the latest observations (IndexReceived,
                  UploadsPrepared, Captured, Ready).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              indexUploadURL:
                description: IndexUploadURL is where the client uploads the hierarchy
                  index (available immediately).
                type: string
              manifestsUploadURL:
                description: ManifestsUploadURL is where the client uploads the whole-tree
                  manifests archive.
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled
                  into this status.
                format: int64
                type: integer
              snapshots:
                description: |-
                  Snapshots is the flat, per-node import view: one entry per snapshot node of the (possibly
                  re-rooted) bundle, carrying that node's per-node manifests upload URL and, for data nodes, the
                  volume data upload endpoint and capture progress. It replaces the former data-only dataSnapshots
                  list. When spec.childSnapshot selects a subtree, only that subtree's nodes appear here.
                items:
                  description: |-
                    SnapshotImportSnapshotEntry is one snapshot node's import view: its per-node manifests upload URL
                    plus, for a data node, the volume data upload endpoint and capture progress.
                  properties:
                    capturedSnapshotContentName:
                      description: |-
                        CapturedSnapshotContentName is the durable VolumeSnapshotContent captured from the populated
                        PVC (via VolumeCaptureRequest), referenced from the recreated SnapshotContent.dataRefs[].
                      type: string
                    manifestsUploadURL:
                      description: |-
                        ManifestsUploadURL is where the client uploads this single node's own manifests (the per-node
                        ?node= upload endpoint). Present for every node, data or not.
                      type: string
                    snapshotID:
                      description: SnapshotID is the stable archive identifier "<kind>--<namespace>--<name>"
                        from the index.
                      minLength: 1
                      type: string
                    uploadCA:
                      description: |-
                        UploadCA is the base64-encoded PEM CA bundle to trust when uploading to the internal UploadURL.
                        It is empty for a published (externally-trusted) endpoint.
                      type: string
                    uploadReady:
                      description: UploadReady indicates the populating PVC + importer
                        endpoint are ready to receive data.
                      type: boolean
                    uploadURL:
                      description: |-
                        UploadURL is the endpoint to upload this snapshot's volume data (data nodes only, set when
                        UploadReady).
                      type: string
                    uploaded:
                      description: Uploaded indicates the client signalled completion
                        of this data upload.
                      type: boolean
                    volumeMode:
                      description: |-
                        VolumeMode is the data volume mode (Block or Filesystem); it selects the upload endpoint and the
                        on-disk layout. Empty for dataless nodes.
                      type: string
                  required:
                  - snapshotID
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - snapshotID
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
