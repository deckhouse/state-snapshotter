spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Неизменяемый чекпоинт состояния манифестов, созданный по ManifestCaptureRequest.
          properties:
            spec:
              properties:
                sourceNamespace:
                  description: |
                    Namespace исходного ManifestCaptureRequest. Единственное долговечное поле происхождения:
                    исходный ManifestCaptureRequest недолговечен (удаляется сразу после создания чекпоинта) и
                    не разрешается по ссылке, поэтому чекпоинт не хранит обратную ссылку на него. Имя исходного
                    запроса записывается в метку state-snapshotter.deckhouse.io/source-request.
            status:
              properties:
                chunks:
                  description: Сведения обо всех чанках чекпоинта.
                  items:
                    properties:
                      checksum:
                        description: |
                          SHA256-хеш сжатых данных чанка (в кодировке base64).
                          Используется для проверки целостности и отладки.
                      index:
                        description: Индекс чанка (с нуля).
                      name:
                        description: Имя чанка.
                      objectsCount:
                        description: Количество объектов в этом чанке.
                      sizeBytes:
                        description: Размер чанка в байтах (сжатые данные).
                conditions:
                  description: |
                    Условия, отражающие текущее состояние чекпоинта.
                    Ожидаемый тип: Ready.
                  items:
                    properties:
                      lastTransitionTime:
                        description: |
                          Время последнего перехода условия из одного статуса в другой.
                      message:
                        description: |
                          Человекочитаемое сообщение с подробностями о переходе статуса.
                      observedGeneration:
                        description: |
                          Значение `.metadata.generation`, на основе которого было установлено условие.
                      reason:
                        description: |
                          Программный идентификатор причины последнего перехода условия.
                      status:
                        description: Статус условия — True, False или Unknown.
                      type:
                        description: Тип условия в формате CamelCase или foo.example.com/CamelCase.
                totalObjects:
                  description: Общее количество захваченных объектов.
                totalSizeBytes:
                  description: Суммарный размер всех чанков в байтах (сжатые данные).
