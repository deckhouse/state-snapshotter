spec:
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SnapshotContent holds the result of a snapshot (shared carrier for multiple snapshot
          root kinds).
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.

              Servers should convert recognized schemas to the latest internal value, and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.

              Servers may infer this from the endpoint the client submits requests to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
          spec:
            properties:
              deletionPolicy:
                description: DeletionPolicy controls whether the controller may delete this SnapshotContent
                  when the root snapshot is removed.
              snapshotRef:
                description: 'SnapshotRef is the required, immutable back-reference to the snapshot subject
                  that owns this

                  content, mirroring VolumeSnapshotContent.spec.volumeSnapshotRef. It is set at creation
                  time by

                  whichever controller binds the content via the snapshot''s status.boundSnapshotContentName
                  (a core

                  Snapshot, a domain XXXSnapshot, or a CSI VolumeSnapshot for orphan volume nodes), and
                  it is the

                  anti-spoofing handshake: a consumer (static bind / restore) accepts a content only when
                  this ref

                  points back at the very snapshot that referenced it, so a user cannot attach a foreign
                  content by

                  pointing status.boundSnapshotContentName at it. The whole spec is immutable, so this
                  ref cannot

                  change after creation.'
                properties:
                  uid:
                    description: 'UID is a type that holds unique ID values, including UUIDs.  Because
                      we

                      don''t ONLY use UUIDs, this is an alias to string.  Being a type captures

                      intent and helps make sure that UIDs and names do not get conflated.'
          status:
            properties:
              childrenSnapshotContentRefs:
                description: ChildrenSnapshotContentRefs lists direct child SnapshotContent objects in
                  the snapshot tree.
                items:
                  description: 'SnapshotContentChildRef identifies one child common SnapshotContent in
                    the target content graph.

                    SnapshotContent is cluster-scoped, so the ref is name-only and MUST NOT carry namespace.'
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state of this
                    API Resource.
                  properties:
                    lastTransitionTime:
                      description: 'lastTransitionTime is the last time the condition transitioned from
                        one status to another.

                        This should be when the underlying condition changed.  If that is not known, then
                        using the time when the API field changed is acceptable.'
                    message:
                      description: 'message is a human readable message indicating details about the transition.

                        This may be an empty string.'
                    observedGeneration:
                      description: 'observedGeneration represents the .metadata.generation that the condition
                        was set based upon.

                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date

                        with respect to the current state of the instance.'
                    reason:
                      description: 'reason contains a programmatic identifier indicating the reason for
                        the condition''s last transition.

                        Producers of specific condition types may define expected values and meanings
                        for this field,

                        and whether the values are considered a guaranteed API.

                        The value should be a CamelCase string.

                        This field may not be empty.'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
              dataRef:
                description: 'DataRef is the single PVC-target-to-data-artifact binding for this logical
                  snapshot node.

                  Variant A (cardinality ≤1): a node carries at most one data artifact; multiple volumes
                  are

                  represented as separate child volume nodes (childrenSnapshotContentRefs), never as a
                  list here.'
                properties:
                  accessModes:
                    description: AccessModes records the source PVC access modes (e.g. ReadWriteOnce,
                      ReadWriteMany).
                  artifact:
                    description: Artifact references the cluster-scoped durable data artifact (for example
                      VolumeSnapshotContent).
                  fsType:
                    description: FsType records the source filesystem type (Filesystem volumes only).
                  size:
                    description: 'Size records the real allocated size of the captured volume, taken from
                      the data artifact

                      (VolumeSnapshotContent.status.restoreSize). The snapshot outlives the source PVC,
                      so the size MUST

                      be persisted here to recreate the volume on restore/export (the export VolumeRestoreRequest
                      sizes

                      the target PVC from it). Stored as a resource.Quantity string (e.g. "10Gi") to keep
                      the api module

                      dependency-free; controllers parse it via resource.ParseQuantity.'
                  storageClassName:
                    description: 'StorageClassName records the source StorageClass of the captured volume.
                      Used by the

                      aggregated /index and by import StorageClass mapping.'
                  target:
                    description: Target identifies the PVC (and related metadata) captured in MCP for
                      this binding.
                    properties:
                      uid:
                        description: 'UID is a type that holds unique ID values, including UUIDs.  Because
                          we

                          don''t ONLY use UUIDs, this is an alias to string.  Being a type captures

                          intent and helps make sure that UIDs and names do not get conflated.'
                  targetUID:
                    description: TargetUID identifies the captured PersistentVolumeClaim (its UID) backing
                      this node's data.
                  volumeMode:
                    description: 'VolumeMode records the source volume mode (Block or Filesystem). CSI
                      snapshots are

                      mode-agnostic, so this is persisted here to drive the unified export (VolumeRestoreRequest)

                      and to recreate the PVC on import. Typed as a string to keep the api module dependency-free;

                      controllers convert it to corev1.PersistentVolumeMode.'
              manifestCheckpointName:
                description: ManifestCheckpointName is the cluster-scoped ManifestCheckpoint name once
                  manifest capture has persisted.
              residualVolumeCapture:
                description: 'ResidualVolumeCapture latches completion of the final residual/orphan-PVC
                  capture wave on a

                  namespace-root SnapshotContent. It is the gate signal the aggregator reads to hold the
                  FIRST

                  Ready=True until the residual wave is done (fail-closed). It is written ONLY by the
                  snapshot

                  reconciler (the sole owner of the namespace PVC scope), never by the aggregator: absence
                  (or any

                  Phase != Complete) means "wave not finished yet". See ResidualVolumeCaptureStatus.'
                properties:
                  completedAt:
                    description: CompletedAt records when the latch reached Complete. Diagnostic only.
                  phase:
                    description: 'Phase is the latch state. The reconciler writes only Complete; the aggregator
                      treats anything

                      other than Complete (including an absent residualVolumeCapture) as "wave not finished".'
                  targetUIDs:
                    description: 'TargetUIDs records the captured orphan PVC UIDs at completion (empty
                      when there were no orphan

                      targets). Diagnostic only; the gate does not read it.'
