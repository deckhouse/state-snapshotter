---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    module: state-snapshotter
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    module: state-snapshotter
  name: demovirtualdisks.demo.state-snapshotter.deckhouse.io
spec:
  group: demo.state-snapshotter.deckhouse.io
  names:
    kind: DemoVirtualDisk
    listKind: DemoVirtualDiskList
    plural: demovirtualdisks
    shortNames:
    - demovd
    singular: demovirtualdisk
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DemoVirtualDisk is the demo domain data resource. The domain controller materializes its backing PVC
          (a blank, freshly provisioned disk, or one restored from a DemoVirtualDiskSnapshot) and publishes real
          allocated capacity in status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              dataSource:
                description: |-
                  DataSource, when set, declares restore intent: this disk is provisioned from an existing
                  DemoVirtualDiskSnapshot in the same namespace (mirroring PVC.spec.dataSource -> VolumeSnapshot).
                properties:
                  apiGroup:
                    description: |-
                      APIGroup of the source object's kind (for example demo.state-snapshotter.deckhouse.io). An empty
                      value refers to the core API group.
                    type: string
                  kind:
                    description: Kind of the source object (must be DemoVirtualDiskSnapshot).
                    minLength: 1
                    type: string
                  name:
                    description: Name of the source object in the same namespace as
                      the disk.
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
              persistentVolumeClaimName:
                description: |-
                  PersistentVolumeClaimName is the in-namespace PVC the disk controller creates and owns: the disk
                  snapshot owns the PVC data leg, creating a VolumeCaptureRequest for the PVC and publishing the bound
                  VolumeSnapshotContent into its SnapshotContent.status.dataRef. The PVC then becomes a subtree-covered
                  volume and the namespace root MUST NOT treat it as an orphan PVC (no root VS). This field is REQUIRED:
                  every DemoVirtualDisk must be backed by a PVC; manifest-only disks (no data leg) are not allowed
                  (enforced by a spec XValidation rule).
                type: string
              size:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Size is the requested storage capacity for a blank (empty) disk. Required when dataSource is unset.
                  Ignored for restore disks (size comes from the snapshot data artifact / VSC.restoreSize).
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              storageClassName:
                description: |-
                  StorageClassName is the StorageClass for the blank PVC, or the fallback when restoring if the
                  snapshot dataRef does not carry a StorageClassName.
                type: string
              volumeMode:
                description: |-
                  VolumeMode selects Block or Filesystem for the blank PVC, or the fallback when restoring if the
                  snapshot dataRef does not carry volumeMode (restore still requires a mode before VRR creation).
                enum:
                - Block
                - Filesystem
                type: string
            type: object
            x-kubernetes-validations:
            - message: dataSource must reference DemoVirtualDiskSnapshot (cloning
                from another DemoVirtualDisk is not supported)
              rule: '!has(self.dataSource) || self.dataSource.kind == ''DemoVirtualDiskSnapshot'''
            - message: dataSource apiGroup must be demo.state-snapshotter.deckhouse.io
                or empty
              rule: '!has(self.dataSource) || !has(self.dataSource.apiGroup) || size(self.dataSource.apiGroup)
                == 0 || self.dataSource.apiGroup == ''demo.state-snapshotter.deckhouse.io'''
            - message: size is required when dataSource is not set (blank disk provisioning)
              rule: has(self.dataSource) || has(self.size)
            - message: 'persistentVolumeClaimName is required: every DemoVirtualDisk
                must be backed by a PVC (manifest-only disks are not allowed)'
              rule: has(self.persistentVolumeClaimName) && size(self.persistentVolumeClaimName)
                > 0
          status:
            properties:
              capacity:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  Capacity reports the REAL allocated size of the disk's backing volume, mirroring
                  PersistentVolumeClaim.status.capacity (a ResourceList keyed by resource name such as "storage").
                  The snapshot import path reads this from the captured raw manifest in MCP to size the blank PVC /
                  restored volume, so every domain data resource MUST publish its real allocated size here (not the
                  requested size). The map is typed with apimachinery's resource.Quantity (string key) to keep the
                  api module dependency-free while staying wire-compatible with corev1.ResourceList. See unified
                  snapshot plan §2 (volume metadata / status.capacity contract).
                type: object
              conditions:
                description: Conditions report readiness and materialization progress.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              persistentVolumeClaimRef:
                description: PersistentVolumeClaimRef references the materialized
                  backing PVC in the same namespace.
                properties:
                  name:
                    description: Name of the referenced object.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              phase:
                description: Phase summarizes disk materialization (Pending, Ready,
                  Failed).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
