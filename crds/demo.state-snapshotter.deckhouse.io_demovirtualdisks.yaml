kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: demovirtualdisks.demo.state-snapshotter.deckhouse.io
spec:
  group: demo.state-snapshotter.deckhouse.io
  names:
    kind: DemoVirtualDisk
    listKind: DemoVirtualDiskList
    plural: demovirtualdisks
    shortNames:
    - demovd
    singular: demovirtualdisk
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DemoVirtualDisk is a minimal placeholder "resource" side for
          CSD mapping (PR5a); not used by reconcile logic yet.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              dataSource:
                description: |-
                  DataSource, when set, declares restore intent: this disk is to be provisioned from an existing
                  snapshot, mirroring how PVC.spec.dataSource references a VolumeSnapshot. The reference points to a
                  DemoVirtualDiskSnapshot. This records intent only; restore reconcile is not implemented yet.
                properties:
                  apiGroup:
                    description: |-
                      APIGroup of the source object's kind (for example demo.state-snapshotter.deckhouse.io). An empty
                      value refers to the core API group.
                    type: string
                  kind:
                    description: Kind of the source object (for example DemoVirtualDiskSnapshot).
                    minLength: 1
                    type: string
                  name:
                    description: Name of the source object in the same namespace as
                      the disk.
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
              persistentVolumeClaimName:
                description: |-
                  PersistentVolumeClaimName is the in-namespace PVC backing this disk. When set, the disk snapshot
                  owns the PVC data leg: it creates a VolumeCaptureRequest for the PVC and publishes the bound
                  VolumeSnapshotContent into its SnapshotContent.status.dataRefs[]. The PVC then becomes a
                  subtree-covered volume and the namespace root MUST NOT treat it as an orphan PVC (no root VS).
                  When empty the disk is manifest-only (no data leg).
                type: string
            type: object
          status:
            type: object
        type: object
    served: true
