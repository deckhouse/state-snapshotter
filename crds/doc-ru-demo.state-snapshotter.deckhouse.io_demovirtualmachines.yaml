spec:
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: 'DemoVirtualMachine is the demo domain compute resource. The domain controller materializes
          a Pod that

          mounts the backing PVC of the linked DemoVirtualDisk.'
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.

              Servers should convert recognized schemas to the latest internal value, and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.

              Servers may infer this from the endpoint the client submits requests to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
          spec:
            properties:
              virtualDiskName:
                description: 'VirtualDiskName links this VM to a DemoVirtualDisk for snapshot-tree planning
                  (parent -> child).

                  The reference points DOWN the hierarchy (VM -> Disk -> PVC), mirroring

                  DemoVirtualDisk.spec.persistentVolumeClaimName. Kubernetes ownerReferences are lifecycle

                  metadata only and are not used as topology source-of-truth.'
          status:
            properties:
              conditions:
                description: Conditions report readiness and materialization progress.
                items:
                  description: Condition contains details for one aspect of the current state of this
                    API Resource.
                  properties:
                    lastTransitionTime:
                      description: 'lastTransitionTime is the last time the condition transitioned from
                        one status to another.

                        This should be when the underlying condition changed.  If that is not known, then
                        using the time when the API field changed is acceptable.'
                    message:
                      description: 'message is a human readable message indicating details about the transition.

                        This may be an empty string.'
                    observedGeneration:
                      description: 'observedGeneration represents the .metadata.generation that the condition
                        was set based upon.

                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date

                        with respect to the current state of the instance.'
                    reason:
                      description: 'reason contains a programmatic identifier indicating the reason for
                        the condition''s last transition.

                        Producers of specific condition types may define expected values and meanings
                        for this field,

                        and whether the values are considered a guaranteed API.

                        The value should be a CamelCase string.

                        This field may not be empty.'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
              phase:
                description: Phase summarizes VM materialization (Pending, Ready, Failed).
              podRef:
                description: PodRef references the materialized demo Pod in the same namespace.
                properties:
                  name:
                    description: Name of the referenced object.
