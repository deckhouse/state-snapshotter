spec:
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DemoVirtualDiskSnapshot is a minimal demo snapshot node (PR5a). Wires into root Snapshot
          via children*Refs.
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.

              Servers should convert recognized schemas to the latest internal value, and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.

              Servers may infer this from the endpoint the client submits requests to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
          spec:
            description: 'DemoVirtualDiskSnapshotSpec defines the desired state of DemoVirtualDiskSnapshot.
              Exactly one of

              SourceRef (capture) or Source (import) is set.'
            properties:
              source:
                description: 'Source, when set, switches this disk snapshot into IMPORT mode. Only the
                  import marker is allowed on

                  a demo snapshot leaf (no static pre-provisioning), so spec.source.import: {} is the
                  sole valid form.

                  In import mode the domain controller does NO capture planning (no source-disk lookup,
                  no MCR/VCR):

                  the common controller materializes the backing SnapshotContent from the uploaded manifests
                  and the

                  data leg from the matching DataImport (reverse-lookup by DataImport.spec.targetRef).
                  Immutable once set.'
                properties:
                  import:
                    description: 'Import, when present, marks this Snapshot as an import target. It is
                      an empty marker object —

                      its mere presence selects import mode (content is materialized from an uploaded
                      payload, not

                      captured from the live namespace). Kept as a struct (not a bool) to mirror VolumeSnapshot-style

                      source members and to allow future import options without another union rewrite.'
                  snapshotContentName:
                    description: 'SnapshotContentName binds this Snapshot to an existing cluster-scoped
                      SnapshotContent

                      (static pre-provisioning, analogous to volumeSnapshotContentName).'
              sourceRef:
                description: 'SourceRef identifies the DemoVirtualDisk captured by this snapshot in CAPTURE
                  mode. It is the

                  single source-of-truth for what the snapshot captures and is immutable once set. It
                  is a pointer so

                  its presence unambiguously selects capture mode for the exactly-one-of rule; an IMPORT-mode
                  snapshot

                  (spec.source.import) has no live source disk and omits it.'
          status:
            description: DemoVirtualDiskSnapshotStatus defines the observed state of DemoVirtualDiskSnapshot.
            properties:
              boundSnapshotContentName:
                description: BoundSnapshotContentName is the cluster-scoped SnapshotContent name, once
                  created.
              conditions:
                description: Conditions report readiness (e.g. Ready=True for generic parent children-readiness
                  aggregation).
                items:
                  description: Condition contains details for one aspect of the current state of this
                    API Resource.
                  properties:
                    lastTransitionTime:
                      description: 'lastTransitionTime is the last time the condition transitioned from
                        one status to another.

                        This should be when the underlying condition changed.  If that is not known, then
                        using the time when the API field changed is acceptable.'
                    message:
                      description: 'message is a human readable message indicating details about the transition.

                        This may be an empty string.'
                    observedGeneration:
                      description: 'observedGeneration represents the .metadata.generation that the condition
                        was set based upon.

                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date

                        with respect to the current state of the instance.'
                    reason:
                      description: 'reason contains a programmatic identifier indicating the reason for
                        the condition''s last transition.

                        Producers of specific condition types may define expected values and meanings
                        for this field,

                        and whether the values are considered a guaranteed API.

                        The value should be a CamelCase string.

                        This field may not be empty.'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
              dataCaptured:
                description: 'DataCaptured is set by the common controller once this disk snapshot''s
                  data leg has been durably

                  handed off to SnapshotContent (dataRefs published and the VolumeSnapshotContent owned
                  by the content).

                  Domain-only suppression signal: the domain controller reads it to stop re-creating the
                  VCR after the

                  common controller deletes it. Always considered captured for a manifest-only disk (no
                  data leg).'
              manifestCaptureRequestName:
                description: ManifestCaptureRequestName is the temporary MCR owned by this snapshot while
                  own-scope capture runs.
              manifestCaptured:
                description: 'ManifestCaptured is set by the common controller once this snapshot''s manifest
                  capture has been

                  durably handed off to SnapshotContent (manifestCheckpointName published and the ManifestCheckpoint

                  owned by the content). It is a domain-only suppression signal: the domain controller
                  reads it to

                  stop re-creating the MCR after the common controller deletes it, without ever reading
                  SnapshotContent.'
              size:
                description: 'Size mirrors the real allocated volume size (e.g. "10Gi"): the bound dataRef.size
                  on capture, or the

                  VolumeSnapshotContent restoreSize on import. Populated by the common controller.'
              storageClassName:
                description: 'StorageClassName mirrors this data leaf''s volume StorageClass for d8 export:
                  the bound

                  SnapshotContent.status.dataRef.storageClassName on capture, or DataImport.spec.storageClassName
                  on

                  import (the import dataRef carries no storageClassName). Populated by the common controller.'
              volumeCaptureRequestName:
                description: 'VolumeCaptureRequestName is the temporary VCR owned by this disk snapshot
                  while data-leg capture runs.

                  The common controller reads this VCR''s result to enrich and publish SnapshotContent.status.dataRefs;

                  the domain controller never touches SnapshotContent itself.'
              volumeMode:
                description: VolumeMode mirrors the source volume mode (Filesystem or Block). Populated
                  by the common controller.
