---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    module: state-snapshotter
  name: customsnapshotdefinitions.state-snapshotter.deckhouse.io
spec:
  group: state-snapshotter.deckhouse.io
  names:
    kind: CustomSnapshotDefinition
    listKind: CustomSnapshotDefinitionList
    plural: customsnapshotdefinitions
    shortNames:
    - csd
    singular: customsnapshotdefinition
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.weight
      name: Weight
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Accepted")].status
      name: Accepted
      type: string
    - jsonPath: .status.conditions[?(@.type=="AccessGranted")].status
      name: AccessGranted
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CustomSnapshotDefinition registers custom snapshot types for platform modules.
          See ADR: snapshot-rework/2026-01-23-unified-snapshots-registry.md
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              CustomSnapshotDefinitionSpec maps one source resource GVK to the snapshot GVK that materializes it.
              One CSD registers exactly one snapshot kind (flat schema): the snapshot apiVersion/kind live at the
              top level, the domain resource being snapshotted is referenced by Source.
            properties:
              apiVersion:
                description: APIVersion is the apiVersion of the snapshot resource
                  that materializes Source.
                minLength: 1
                type: string
              kind:
                description: Kind is the kind of the snapshot resource that materializes
                  Source.
                minLength: 1
                type: string
              requiresDataArtifact:
                description: |-
                  RequiresDataArtifact marks that this snapshot kind carries a volume data leg: the generic
                  controller must wait for the data artifact (capture, SnapshotContent.status.data.artifactRef) or the
                  matching DataImport (import) before it reports Ready. Manifest-only snapshot kinds (no volume
                  data) set false.
                type: boolean
              source:
                description: Source is the GVK of the domain resource being snapshotted.
                properties:
                  apiVersion:
                    minLength: 1
                    type: string
                  kind:
                    minLength: 1
                    type: string
                required:
                - apiVersion
                - kind
                type: object
              weight:
                description: |-
                  Weight orders universal traversal across snapshot kinds by ascending value: lower weights run
                  first (earlier traversal wave), like FlowSchema.spec.matchingPrecedence and the Deckhouse-native
                  NodeGroupConfiguration.spec.weight. It is NOT a Kubernetes PriorityClass value (where a higher
                  number wins) — the ordering here is the opposite.
                format: int32
                minimum: 0
                type: integer
            required:
            - apiVersion
            - kind
            - source
            type: object
          status:
            properties:
              conditions:
                description: |-
                  Conditions carry three distinct signals, each with a single writer:
                    - Accepted — the spec is valid and registrable (written by the CSD reconciler);
                    - AccessGranted — the domain RBAC has been applied (written by the 030-domain-rbac hook);
                    - Ready — the aggregate Ready = Accepted && AccessGranted.
                  Accepted and Ready diverge when Accepted=True but AccessGranted=False (spec accepted, RBAC not yet
                  applied) → Ready=False; the printer columns surface all three so this is visible at a glance.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
