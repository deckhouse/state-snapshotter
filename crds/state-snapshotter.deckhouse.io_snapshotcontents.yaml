---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: snapshotcontents.state-snapshotter.deckhouse.io
spec:
  group: state-snapshotter.deckhouse.io
  names:
    kind: SnapshotContent
    listKind: SnapshotContentList
    plural: snapshotcontents
    shortNames:
    - stsnapct
    singular: snapshotcontent
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="ManifestsReady")].status
      name: Manifests
      type: string
    - jsonPath: .status.conditions[?(@.type=="VolumeReady")].status
      name: Volume
      type: string
    - jsonPath: .status.conditions[?(@.type=="ChildrenReady")].status
      name: Children
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SnapshotContent holds the result of a snapshot (shared carrier for multiple snapshot root kinds).

          The spec is immutable EXCEPT for the snapshotRef back-reference, which the recycle-bin restore path
          (wave4B) re-points onto a freshly re-created snapshot subject. That single carve-out is gated on the
          recycle-bin latch status.parentDeleted: while the owning Snapshot is alive the ref is frozen (the
          anti-spoofing handshake), and it becomes re-pointable only after the parent was deleted and this
          cluster-scoped content survives in the TTL bin. deletionPolicy stays immutable in all cases. The rules
          live on the root object (not the spec field) so CEL can read both self.spec and self.status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              deletionPolicy:
                description: DeletionPolicy controls whether the controller may delete
                  this SnapshotContent when the root snapshot is removed.
                enum:
                - Retain
                - Delete
                type: string
              snapshotRef:
                description: |-
                  SnapshotRef is the required back-reference to the snapshot subject that owns this content, mirroring
                  VolumeSnapshotContent.spec.volumeSnapshotRef. It is set at creation time by whichever controller binds
                  the content via the snapshot's status.boundSnapshotContentName (a core Snapshot, a domain XXXSnapshot,
                  or a CSI VolumeSnapshot for orphan volume nodes), and it is the anti-spoofing handshake: a consumer
                  (static bind / restore) accepts a content only when this ref points back at the very snapshot that
                  referenced it, so a user cannot attach a foreign content by pointing status.boundSnapshotContentName
                  at it. It is immutable while the owning Snapshot is alive; the recycle-bin restore path (wave4B)
                  re-points it onto a freshly re-created subject only once status.parentDeleted latched true (see the
                  object-level XValidation rules). The anti-spoofing check is not weakened by this: restore proceeds by
                  re-pointing the ref onto the new subject's identity, not by bypassing the handshake.
                properties:
                  apiVersion:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
            required:
            - snapshotRef
            type: object
          status:
            properties:
              captureState:
                description: |-
                  CaptureState optionally carries core-written suppression leaves for a domain reader; on a
                  core-owned SnapshotContent aggregator this is normally unset.
                properties:
                  commonController:
                    description: 'CommonController holds the core-written capture-leg
                      success latches. Single writer: core.'
                    properties:
                      dataCaptured:
                        description: |-
                          DataCaptured is the data-leg success latch, declared only where a data line exists (absent = nil on
                          nodes without data, e.g. the namespace root or a manifest-only aggregate). The parent reads a
                          child's dataCaptured to time freeze/unfreeze.
                        type: boolean
                      manifestCaptured:
                        description: |-
                          ManifestCaptured is the manifest-leg success latch (declared on every capture node). nil = no leg;
                          false = declared, not captured yet; true = captured. On the root Snapshot the RBAC hook reads it.
                        type: boolean
                    type: object
                  domainSpecificController:
                    description: 'DomainSpecificController holds the domain-written
                      planning refs and lifecycle. Single writer: domain (SDK).'
                    properties:
                      excludedRefs:
                        description: |-
                          ExcludedRefs are the domain's DIRECT exclusion vetoes at this node: the source objects it dropped
                          (via the exclude label) while enumerating its children. It is the transient INPUT the core reads and
                          folds into the durable SnapshotContent.status.excludedRefs aggregate; the domain never writes the
                          aggregate or the top-level mirror (both are core-owned).

                          Written WITHOUT omitempty: an empty list ([]) means "domain planned, nothing excluded" and MUST be
                          distinguishable from "domain has not planned yet" (domainSpecificController absent). A data-leaf
                          (e.g. a disk) never enumerates children, so it always writes []. Absent in Import/StaticBind
                          (no live capture happens).
                        items:
                          description: |-
                            ExcludedObjectRef identifies one source object excluded from a snapshot (element of
                            status.excludedRefs on Snapshot/domain CRs and SnapshotContent). It is the shadow of SnapshotChildRef:
                            the same {apiVersion,kind,name} shape, but pointing at the SOURCE object that was vetoed out (via the
                            state-snapshotter.deckhouse.io/exclude label, or an explicit top-level drop) rather than at a child
                            snapshot. Namespace is implicit (the snapshot's namespace).

                            Unlike childrenSnapshotRefs (direct edges), the durable aggregate on SnapshotContent collects the
                            excluded refs of the WHOLE subtree, because an excluded object is non-navigable: no snapshot CR is
                            created for it, so it cannot be descended into to recover a per-node view later.
                          properties:
                            apiVersion:
                              type: string
                            kind:
                              type: string
                            name:
                              type: string
                          required:
                          - apiVersion
                          - kind
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      manifestCaptureRequestName:
                        description: ManifestCaptureRequestName is the temporary MCR
                          owned by the domain node while own-scope capture runs.
                        type: string
                      message:
                        description: Message is a human-readable detail for Phase=Failed.
                        type: string
                      phase:
                        description: Phase is the domain lifecycle barrier (Planning|Planned|Finished|Failed).
                        enum:
                        - Planning
                        - Planned
                        - Finished
                        - Failed
                        type: string
                      reason:
                        description: Reason is a short, machine-readable reason for
                          Phase=Failed (free-form domain string).
                        type: string
                      volumeCaptureRequestName:
                        description: VolumeCaptureRequestName is the temporary VCR
                          owned by a data-leaf domain node while the data leg runs.
                        type: string
                    type: object
                type: object
              childrenSnapshotContentRefs:
                description: ChildrenSnapshotContentRefs lists direct child SnapshotContent
                  objects in the snapshot tree.
                items:
                  description: |-
                    SnapshotContentChildRef identifies one child common SnapshotContent in the target content graph.
                    SnapshotContent is cluster-scoped, so the ref is name-only and MUST NOT carry namespace.
                  properties:
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              data:
                description: |-
                  Data is the single PVC-source-to-data-artifact binding for this logical snapshot node.
                  Variant A (cardinality ≤1): a node carries at most one data artifact; multiple volumes are
                  represented as separate child volume nodes (childrenSnapshotContentRefs), never as a list here.
                  It is the durable, self-contained {source, artifact, volume metadata} block the core mirrors onto
                  the namespaced snapshot's top-level status.data.
                properties:
                  accessModes:
                    description: AccessModes records the source PVC access modes (e.g.
                      ReadWriteOnce, ReadWriteMany).
                    items:
                      type: string
                    type: array
                  artifact:
                    description: Artifact references the cluster-scoped durable data
                      artifact (for example VolumeSnapshotContent).
                    properties:
                      apiVersion:
                        minLength: 1
                        type: string
                      kind:
                        minLength: 1
                        type: string
                      name:
                        minLength: 1
                        type: string
                      uid:
                        description: |-
                          UID is the durable data artifact UID (for example the VolumeSnapshotContent UID). It makes the
                          artifact reference self-contained, symmetric with source.uid. Optional: the artifact may be
                          referenced before its UID is known, so producers fill it best-effort.
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                  fsType:
                    description: FsType records the source filesystem type (Filesystem
                      volumes only).
                    type: string
                  size:
                    description: |-
                      Size records the real allocated size of the captured volume, taken from the data artifact
                      (VolumeSnapshotContent.status.restoreSize). The snapshot outlives the source PVC, so the size MUST
                      be persisted here to recreate the volume on restore/export (the export VolumeRestoreRequest sizes
                      the target PVC from it). Stored as a resource.Quantity string (e.g. "10Gi") to keep the api module
                      dependency-free; controllers parse it via resource.ParseQuantity.
                    type: string
                  source:
                    description: |-
                      Source identifies the captured PersistentVolumeClaim (apiVersion/kind/name/namespace + uid) backing
                      this node's data. Its uid is the single volume identity — it replaces the former standalone targetUID.
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                      uid:
                        description: |-
                          UID is a type that holds unique ID values, including UUIDs.  Because we
                          don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                          intent and helps make sure that UIDs and names do not get conflated.
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                  storageClassName:
                    description: |-
                      StorageClassName records the source StorageClass of the captured volume. Used by the
                      aggregated /index and by import StorageClass mapping.
                    type: string
                  volumeMode:
                    description: |-
                      VolumeMode records the source volume mode (Block or Filesystem). CSI snapshots are
                      mode-agnostic, so this is persisted here to drive the unified export (VolumeRestoreRequest)
                      and to recreate the PVC on import. Typed as a string to keep the api module dependency-free;
                      controllers convert it to corev1.PersistentVolumeMode.
                    enum:
                    - Block
                    - Filesystem
                    type: string
                required:
                - artifact
                - source
                type: object
              excludedRefs:
                description: |-
                  ExcludedRefs is the DURABLE AGGREGATE of source objects excluded from this content node's subtree
                  (this node's own direct exclusions UNION the direct exclusions of all descendants; on the root, PLUS
                  the explicit top-level drops). It is written ONLY by the core (single aggregator) and is the TRUTH:
                  being on the cluster-scoped SnapshotContent, it outlives deletion of the namespaced Snapshot (the
                  recycle bin, wave4B) and is what the top-level status.excludedRefs mirrors. It is an aggregate rather
                  than direct edges (like childrenSnapshotContentRefs) because an excluded object is non-navigable: no
                  snapshot node is created for it, so per-node reconstruction is impossible after the fact.
                items:
                  description: |-
                    ExcludedObjectRef identifies one source object excluded from a snapshot (element of
                    status.excludedRefs on Snapshot/domain CRs and SnapshotContent). It is the shadow of SnapshotChildRef:
                    the same {apiVersion,kind,name} shape, but pointing at the SOURCE object that was vetoed out (via the
                    state-snapshotter.deckhouse.io/exclude label, or an explicit top-level drop) rather than at a child
                    snapshot. Namespace is implicit (the snapshot's namespace).

                    Unlike childrenSnapshotRefs (direct edges), the durable aggregate on SnapshotContent collects the
                    excluded refs of the WHOLE subtree, because an excluded object is non-navigable: no snapshot CR is
                    created for it, so it cannot be descended into to recover a per-node view later.
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              manifestCheckpointName:
                description: ManifestCheckpointName is the cluster-scoped ManifestCheckpoint
                  name once manifest capture has persisted.
                type: string
              parentDeleted:
                description: |-
                  ParentDeleted is a one-shot internal latch set by the binder when the parent Snapshot is deleted
                  while this cluster-scoped SnapshotContent survives. Once true, the SnapshotContent controller no
                  longer re-adds the parent-protect finalizer (the parent is gone) and GC may proceed. Monotonic
                  (false -> true only); it replaces the former snapshot.deckhouse.io/parent-deleted annotation.
                type: boolean
              residualVolumeCapture:
                description: |-
                  ResidualVolumeCapture latches completion of the final residual/orphan-PVC capture wave on a
                  namespace-root SnapshotContent. It is the gate signal the aggregator reads to hold the FIRST
                  Ready=True until the residual wave is done (fail-closed). It is written ONLY by the snapshot
                  reconciler (the sole owner of the namespace PVC scope), never by the aggregator: absence (or any
                  Phase != Complete) means "wave not finished yet". See ResidualVolumeCaptureStatus.
                properties:
                  completedAt:
                    description: CompletedAt records when the latch reached Complete.
                      Diagnostic only.
                    format: date-time
                    type: string
                  phase:
                    description: |-
                      Phase is the latch state. The reconciler writes only Complete; the aggregator treats anything
                      other than Complete (including an absent residualVolumeCapture) as "wave not finished".
                    enum:
                    - Pending
                    - Complete
                    type: string
                  targetUIDs:
                    description: |-
                      TargetUIDs records the captured orphan PVC UIDs at completion (empty when there were no orphan
                      targets). Diagnostic only; the gate does not read it.
                    items:
                      type: string
                    type: array
                type: object
              subtreeManifestsPersisted:
                description: |-
                  SubtreeManifestsPersisted is a core-internal monotonic recursive latch (true once this node's own
                  ManifestCheckpoint is Ready AND every declared child SnapshotContent has subtreeManifestsPersisted=true,
                  fail-closed). It replaces the former ManifestsArchived condition (user-facing objects no longer carry
                  it). It serves three purposes not reducible to per-node manifestCaptured: (1) gate the FIRST Ready=True
                  against declared-but-unlinked children, (2) drive the wave-barrier exclude-set of the root MCR (subtree
                  completeness + linkage => no 409 double-capture), (3) monotonicity (never re-opens after the first Ready).
                  It never expresses failure — a terminal manifest failure surfaces via the Ready reason (IsReasonTerminal).
                type: boolean
            type: object
        type: object
        x-kubernetes-validations:
        - message: SnapshotContent spec.snapshotRef is immutable until the parent
            Snapshot is deleted (recycle-bin restore)
          rule: self.spec.snapshotRef == oldSelf.spec.snapshotRef || (has(self.status)
            && has(self.status.parentDeleted) && self.status.parentDeleted)
        - message: SnapshotContent spec.deletionPolicy is immutable
          rule: has(self.spec.deletionPolicy) == has(oldSelf.spec.deletionPolicy)
            && (!has(self.spec.deletionPolicy) || self.spec.deletionPolicy == oldSelf.spec.deletionPolicy)
    served: true
    storage: true
    subresources:
      status: {}
