---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: snapshotexports.storage.deckhouse.io
spec:
  group: storage.deckhouse.io
  names:
    kind: SnapshotExport
    listKind: SnapshotExportList
    plural: snapshotexports
    shortNames:
    - snapexp
    singular: snapshotexport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.snapshotRef.name
      name: Snapshot
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SnapshotExport orchestrates downloading (exporting) a whole Snapshot hierarchy.

          It is a namespaced, user-facing resource. The controller walks the bound SnapshotContent
          tree, restores each data leaf to a PVC via VolumeRestoreRequest, exports each PVC via a
          per-leaf DataExport, and publishes one index URL, one whole-tree manifests URL and a
          per-data-snapshot download URL in status. All intermediate objects live in this namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              publish:
                description: |-
                  Publish exposes the endpoints outside the cluster (Ingress/Route) when true.
                  When false (default), endpoints are only reachable in-cluster.
                type: boolean
              snapshotRef:
                description: SnapshotRef references the root Snapshot (same namespace)
                  to export.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - snapshotRef
            type: object
          status:
            properties:
              conditions:
                description: Conditions represent the latest observations (Ready,
                  DataReady).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dataSnapshots:
                description: DataSnapshots lists per-data-snapshot export endpoints.
                items:
                  description: SnapshotExportDataEntry is one data leaf's export endpoint.
                  properties:
                    dataCA:
                      description: |-
                        DataCA is the base64-encoded PEM CA bundle to trust when downloading from the internal DataURL.
                        It is empty for a published (externally-trusted) endpoint.
                      type: string
                    dataURL:
                      description: DataURL is the endpoint to download this snapshot's
                        volume data.
                      type: string
                    ready:
                      description: Ready indicates the data endpoint is serving (restored
                        PVC bound + DataExport ready).
                      type: boolean
                    snapshotID:
                      description: SnapshotID is the stable archive identifier "<kind>--<namespace>--<name>".
                      minLength: 1
                      type: string
                  required:
                  - snapshotID
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - snapshotID
                x-kubernetes-list-type: map
              indexURL:
                description: IndexURL serves the hierarchy index (snapshot tree +
                  per-snapshot data metadata).
                type: string
              manifestsURL:
                description: ManifestsURL serves the whole-tree manifests archive
                  (proxied aggregated /manifests).
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation last reconciled
                  into this status.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
