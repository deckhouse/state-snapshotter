spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            SnapshotContent хранит результат снимка (общий носитель для нескольких корневых типов снимков).

            Спецификация неизменяема, ЗА ИСКЛЮЧЕНИЕМ обратной ссылки snapshotRef, которую путь восстановления
            из корзины (wave4B) перенаправляет на заново созданный субъект снимка. Это единственное исключение
            разрешено только при выставленной защёлке корзины status.boundSnapshotDeleted: пока владеющий Snapshot жив,
            ссылка заморожена (защита от подмены), и перенаправить её можно только после удаления родителя.
