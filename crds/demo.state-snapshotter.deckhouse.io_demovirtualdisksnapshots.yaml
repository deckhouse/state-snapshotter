---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    module: state-snapshotter
  name: demovirtualdisksnapshots.demo.state-snapshotter.deckhouse.io
spec:
  group: demo.state-snapshotter.deckhouse.io
  names:
    kind: DemoVirtualDiskSnapshot
    listKind: DemoVirtualDiskSnapshotList
    plural: demovirtualdisksnapshots
    shortNames:
    - demovdsnap
    singular: demovirtualdisksnapshot
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: DemoVirtualDiskSnapshot is a minimal demo snapshot node (PR5a).
          Wires into root Snapshot via children*Refs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DemoVirtualDiskSnapshotSpec defines the desired state of DemoVirtualDiskSnapshot. spec.mode selects
              the content source: Capture (sourceRef) or Import (no source).
            properties:
              mode:
                default: Capture
                description: |-
                  Mode selects how this disk snapshot obtains its content (Capture|Import), immutable.
                  Capture: capture the live source disk (spec.sourceRef). Import: materialize from an uploaded payload
                  plus the matching DataImport (no live capture).
                enum:
                - Capture
                - Import
                type: string
              sourceRef:
                description: |-
                  SourceRef identifies the DemoVirtualDisk captured by this snapshot in Capture mode. It is the
                  single source-of-truth for what the snapshot captures and is immutable once set. Required in Capture
                  mode and forbidden otherwise.
                properties:
                  apiVersion:
                    minLength: 1
                    type: string
                  kind:
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
            type: object
            x-kubernetes-validations:
            - message: spec is immutable
              rule: self == oldSelf
            - message: spec.sourceRef is required in Capture mode and forbidden otherwise
              rule: 'self.mode == ''Capture'' ? has(self.sourceRef) : !has(self.sourceRef)'
          status:
            description: DemoVirtualDiskSnapshotStatus defines the observed state
              of DemoVirtualDiskSnapshot.
            properties:
              boundSnapshotContentName:
                description: BoundSnapshotContentName is the cluster-scoped SnapshotContent
                  name, once created.
                type: string
              captureState:
                description: |-
                  CaptureState collects internal capture signals: commonController (core-written leg latches
                  manifestCaptured/dataCaptured) and domainSpecificController (domain-written MCR/VCR refs + phase).
                properties:
                  commonController:
                    description: 'CommonController holds the core-written capture-leg
                      success latches. Single writer: core.'
                    properties:
                      dataCaptured:
                        description: |-
                          DataCaptured is the data-leg success latch, declared only where a data line exists (absent = nil on
                          nodes without data, e.g. the namespace root or a manifest-only aggregate). The parent reads a
                          child's dataCaptured to time freeze/unfreeze.
                        type: boolean
                      manifestCaptured:
                        description: |-
                          ManifestCaptured is the manifest-leg success latch (declared on every capture node). nil = no leg;
                          false = declared, not captured yet; true = captured. On the root Snapshot the RBAC hook reads it.
                        type: boolean
                      subtreeManifestsPersisted:
                        description: |-
                          SubtreeManifestsPersisted is a core-written MIRROR of the bound SnapshotContent.status.subtreeManifestsPersisted
                          (the recursive "this node and all descendants archived their manifests" latch). It is NOT a capture
                          leg: it is NOT part of CoreCaptureOutcome, and it is distinct from ManifestCaptured (which the root
                          RBAC hook reads). Its purpose is a cheap namespaced pre-gate for the SDK manifest-exclude computation:
                          an aggregator reads its DIRECT children's mirror to decide when to attempt building its own MCR
                          (base - exclude) — it cannot gate on its OWN subtree latch, which would include its not-yet-created
                          own manifest (circular). The gate is best-effort: the subtree-manifest-identities subresource is
                          fail-closed (409 while any subtree MCP is not Ready), so correctness holds even for children that
                          carry no mirror. nil = not yet mirrored / no bound content. Monotonic (false -> true).
                        type: boolean
                      subtreePlanned:
                        description: |-
                          SubtreePlanned is a core-computed monotonic recursive latch: true once THIS node reached capture
                          barrier 1 (domainSpecificController.phase >= Planned) AND every DIRECT child's own SubtreePlanned is
                          true — i.e. the whole subtree has finished planning (objects + refs published, not necessarily
                          captured/Ready). It is snapshot-native and main-written (the aggregator computes it by resolving the
                          owner's direct children from status.childrenSnapshotRefs and reading each child's latch, then writes
                          it SIDEWAYS onto this snapshot; content has no phase, so this cannot live on the SnapshotContent).
                          The root's orphan/residual-PVC wave gates on its direct children's SubtreePlanned so an orphan PVC is
                          evaluated only once every declared subtree's coverage is fully computable (no premature root exclude).
                          It is NOT a capture leg (not part of CoreCaptureOutcome). Domains only READ it. nil = subtree not
                          planned yet. Monotonic (nil/false -> true; the spec is immutable, so no recapture flips it back).
                        type: boolean
                    type: object
                  domainSpecificController:
                    description: 'DomainSpecificController holds the domain-written
                      planning refs and lifecycle. Single writer: domain (SDK).'
                    properties:
                      excludedRefs:
                        description: |-
                          ExcludedRefs are the domain's DIRECT exclusion vetoes at this node: the source objects it dropped
                          (via the exclude label) while enumerating its children. It is the transient INPUT the core reads and
                          folds into the durable SnapshotContent.status.excludedRefs aggregate; the domain never writes the
                          aggregate or the top-level mirror (both are core-owned).

                          Written WITHOUT omitempty: an empty list ([]) means "domain planned, nothing excluded" and MUST be
                          distinguishable from "domain has not planned yet" (domainSpecificController absent). A data-leaf
                          (e.g. a disk) never enumerates children, so it always writes []. Absent in Import
                          (no live capture happens).
                        items:
                          description: |-
                            ExcludedObjectRef identifies one source object excluded from a snapshot (element of
                            status.excludedRefs on Snapshot/domain CRs and SnapshotContent). It is the shadow of SnapshotChildRef:
                            the same {apiVersion,kind,name} shape, but pointing at the SOURCE object that was vetoed out (via the
                            state-snapshotter.deckhouse.io/exclude label, or an explicit top-level drop) rather than at a child
                            snapshot. Namespace is implicit (the snapshot's namespace).

                            Unlike childrenSnapshotRefs (direct edges), the durable aggregate on SnapshotContent collects the
                            excluded refs of the WHOLE subtree, because an excluded object is non-navigable: no snapshot CR is
                            created for it, so it cannot be descended into to recover a per-node view later.
                          properties:
                            apiVersion:
                              type: string
                            kind:
                              type: string
                            name:
                              type: string
                          required:
                          - apiVersion
                          - kind
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      manifestCaptureRequestName:
                        description: ManifestCaptureRequestName is the temporary MCR
                          owned by the domain node while own-scope capture runs.
                        type: string
                      message:
                        description: Message is a human-readable detail for Phase=Failed.
                        type: string
                      phase:
                        description: Phase is the domain lifecycle barrier (Planning|Planned|Finished|Failed).
                        enum:
                        - Planning
                        - Planned
                        - Finished
                        - Failed
                        type: string
                      reason:
                        description: Reason is a short, machine-readable reason for
                          Phase=Failed (free-form domain string).
                        type: string
                      volumeCaptureRequestName:
                        description: VolumeCaptureRequestName is the temporary VCR
                          owned by a data-leaf domain node while the data leg runs.
                        type: string
                    type: object
                type: object
              childrenSnapshotRefs:
                description: ChildrenSnapshotRefs is empty on a data-leaf disk snapshot
                  (kept for uniformity across snapshot kinds).
                items:
                  description: |-
                    SnapshotChildRef identifies one child snapshot object in the run tree (element of
                    status.childrenSnapshotRefs). apiVersion and kind are required (Kubernetes-style reference);
                    generic code resolves the object with a single client Get — no registry scan and no ambiguity.

                    Snapshot-run tree is namespace-local to the root Snapshot: the child object MUST live
                    in the same namespace as that parent. Namespace is implicit and always taken from parent
                    Snapshot namespace. Cross-namespace refs are not part of this model.
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - apiVersion
                - kind
                - name
                x-kubernetes-list-type: map
              conditions:
                description: Conditions report readiness. Ready is the single user-facing
                  condition, always derived by the core.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              data:
                description: |-
                  Data is the self-contained, top-level captured-volume descriptor for this data leaf: the
                  {source, artifact, volumeMode, fsType, accessModes, storageClassName, size} block the core mirrors
                  verbatim from the bound SnapshotContent.status.data (mirrorLeafDataFromContent). It makes the
                  namespaced snapshot self-sufficient for d8 export/restore without reading the cluster-scoped
                  SnapshotContent. It replaces the former flat status.storageClassName/size/volumeMode mirrors.
                  Populated by the common controller once the bound content has a published data binding.
                properties:
                  accessModes:
                    description: AccessModes records the source PVC access modes (e.g.
                      ReadWriteOnce, ReadWriteMany).
                    items:
                      type: string
                    type: array
                  artifact:
                    description: Artifact references the cluster-scoped durable data
                      artifact (for example VolumeSnapshotContent).
                    properties:
                      apiVersion:
                        minLength: 1
                        type: string
                      kind:
                        minLength: 1
                        type: string
                      name:
                        minLength: 1
                        type: string
                      uid:
                        description: |-
                          UID is the durable data artifact UID (for example the VolumeSnapshotContent UID). It makes the
                          artifact reference self-contained, symmetric with source.uid. Optional: the artifact may be
                          referenced before its UID is known, so producers fill it best-effort.
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                  fsType:
                    description: FsType records the source filesystem type (Filesystem
                      volumes only).
                    type: string
                  size:
                    description: |-
                      Size records the real allocated size of the captured volume, taken from the data artifact
                      (VolumeSnapshotContent.status.restoreSize). The snapshot outlives the source PVC, so the size MUST
                      be persisted here to recreate the volume on restore/export (the export VolumeRestoreRequest sizes
                      the target PVC from it). Stored as a resource.Quantity string (e.g. "10Gi") to keep the api module
                      dependency-free; controllers parse it via resource.ParseQuantity.
                    type: string
                  source:
                    description: |-
                      Source identifies the captured PersistentVolumeClaim (apiVersion/kind/name/namespace + uid) backing
                      this node's data. Its uid is the single volume identity — it replaces the former standalone targetUID.
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                      uid:
                        description: |-
                          UID is a type that holds unique ID values, including UUIDs.  Because we
                          don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                          intent and helps make sure that UIDs and names do not get conflated.
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                  storageClassName:
                    description: |-
                      StorageClassName records the source StorageClass of the captured volume. Used by the
                      aggregated /index and by import StorageClass mapping.
                    type: string
                  volumeMode:
                    description: |-
                      VolumeMode records the source volume mode (Block or Filesystem). CSI snapshots are
                      mode-agnostic, so this is persisted here to drive the unified export (VolumeRestoreRequest)
                      and to recreate the PVC on import. Typed as a string to keep the api module dependency-free;
                      controllers convert it to corev1.PersistentVolumeMode.
                    enum:
                    - Block
                    - Filesystem
                    type: string
                required:
                - artifact
                - source
                type: object
              excludedRefs:
                description: |-
                  ExcludedRefs is the TOP-LEVEL MIRROR of the bound SnapshotContent's durable excludedRefs aggregate,
                  written ONLY by the core (as it mirrors Ready). A data-leaf disk has no children, so this is
                  normally empty; it is kept for uniformity across snapshot kinds.
                items:
                  description: |-
                    ExcludedObjectRef identifies one source object excluded from a snapshot (element of
                    status.excludedRefs on Snapshot/domain CRs and SnapshotContent). It is the shadow of SnapshotChildRef:
                    the same {apiVersion,kind,name} shape, but pointing at the SOURCE object that was vetoed out (via the
                    state-snapshotter.deckhouse.io/exclude label, or an explicit top-level drop) rather than at a child
                    snapshot. Namespace is implicit (the snapshot's namespace).

                    Unlike childrenSnapshotRefs (direct edges), the durable aggregate on SnapshotContent collects the
                    excluded refs of the WHOLE subtree, because an excluded object is non-navigable: no snapshot CR is
                    created for it, so it cannot be descended into to recover a per-node view later.
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              snapshotSource:
                description: |-
                  SnapshotSource is the full reference to the captured live source object (top-level, written by the
                  domain controller via PublishSnapshotSource). Self-contained for import-mode recreation.
                properties:
                  apiVersion:
                    minLength: 1
                    type: string
                  kind:
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the source object (namespaced sources
                      only).
                    type: string
                  uid:
                    description: UID of the captured live source object (best-effort;
                      used by d8-cli for import-mode recreation).
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
