spec:
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: 'DemoVirtualDisk is the demo domain data resource. The domain controller materializes
          its backing PVC

          (a blank, freshly provisioned disk, or one restored from a DemoVirtualDiskSnapshot) and publishes
          real

          allocated capacity in status.'
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.

              Servers should convert recognized schemas to the latest internal value, and

              may reject unrecognized values.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.

              Servers may infer this from the endpoint the client submits requests to.

              Cannot be updated.

              In CamelCase.

              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
          spec:
            properties:
              dataSource:
                description: 'DataSource, when set, declares restore intent: this disk is provisioned
                  from an existing

                  DemoVirtualDiskSnapshot in the same namespace (mirroring PVC.spec.dataSource -> VolumeSnapshot).'
                properties:
                  apiGroup:
                    description: 'APIGroup of the source object''s kind (for example demo.state-snapshotter.deckhouse.io).
                      An empty

                      value refers to the core API group.'
                  kind:
                    description: Kind of the source object (must be DemoVirtualDiskSnapshot).
                  name:
                    description: Name of the source object in the same namespace as the disk.
              persistentVolumeClaimName:
                description: 'PersistentVolumeClaimName is the in-namespace PVC the disk controller creates
                  and owns: the disk

                  snapshot owns the PVC data leg, creating a VolumeCaptureRequest for the PVC and publishing
                  the bound

                  VolumeSnapshotContent into its SnapshotContent.status.dataRef. The PVC then becomes
                  a subtree-covered

                  volume and the namespace root MUST NOT treat it as an orphan PVC (no root VS). This
                  field is REQUIRED:

                  every DemoVirtualDisk must be backed by a PVC; manifest-only disks (no data leg) are
                  not allowed

                  (enforced by a spec XValidation rule).'
              size:
                description: 'Size is the requested storage capacity for a blank (empty) disk. Required
                  when dataSource is unset.

                  Ignored for restore disks (size comes from the snapshot data artifact / VSC.restoreSize).'
              storageClassName:
                description: 'StorageClassName is the StorageClass for the blank PVC, or the fallback
                  when restoring if the

                  snapshot dataRef does not carry a StorageClassName.'
              volumeMode:
                description: 'VolumeMode selects Block or Filesystem for the blank PVC, or the fallback
                  when restoring if the

                  snapshot dataRef does not carry volumeMode (restore still requires a mode before VRR
                  creation).'
          status:
            properties:
              capacity:
                description: 'Capacity reports the REAL allocated size of the disk''s backing volume,
                  mirroring

                  PersistentVolumeClaim.status.capacity (a ResourceList keyed by resource name such as
                  "storage").

                  The snapshot import path reads this from the captured raw manifest in MCP to size the
                  blank PVC /

                  restored volume, so every domain data resource MUST publish its real allocated size
                  here (not the

                  requested size). The map is typed with apimachinery''s resource.Quantity (string key)
                  to keep the

                  api module dependency-free while staying wire-compatible with corev1.ResourceList. See
                  unified

                  snapshot plan §2 (volume metadata / status.capacity contract).'
              conditions:
                description: Conditions report readiness and materialization progress.
                items:
                  description: Condition contains details for one aspect of the current state of this
                    API Resource.
                  properties:
                    lastTransitionTime:
                      description: 'lastTransitionTime is the last time the condition transitioned from
                        one status to another.

                        This should be when the underlying condition changed.  If that is not known, then
                        using the time when the API field changed is acceptable.'
                    message:
                      description: 'message is a human readable message indicating details about the transition.

                        This may be an empty string.'
                    observedGeneration:
                      description: 'observedGeneration represents the .metadata.generation that the condition
                        was set based upon.

                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date

                        with respect to the current state of the instance.'
                    reason:
                      description: 'reason contains a programmatic identifier indicating the reason for
                        the condition''s last transition.

                        Producers of specific condition types may define expected values and meanings
                        for this field,

                        and whether the values are considered a guaranteed API.

                        The value should be a CamelCase string.

                        This field may not be empty.'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
              persistentVolumeClaimRef:
                description: PersistentVolumeClaimRef references the materialized backing PVC in the same
                  namespace.
                properties:
                  name:
                    description: Name of the referenced object.
              phase:
                description: Phase summarizes disk materialization (Pending, Ready, Failed).
