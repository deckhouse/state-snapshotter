Изменения:
  - Релиз уровня General Availability. state-snapshotter переведён в GA и автовключается в бандлах
    Default, Managed и Minimal (базовая функциональность резервного копирования доступна всегда).
  - Эта версия v1.0.0 — базовая, на которую пинится модуль storage-foundation (requirements.modules
    state-snapshotter >= 1.0.0), строящий поверх неё свой домен снимков.
  - Требует Deckhouse >= 1.76 (согласовано со стеком unified snapshots, который поставляет
    совместимый d8 CLI). Модуль больше не активируется на кластерах ниже 1.76, в том числе в
    бандле Minimal.
