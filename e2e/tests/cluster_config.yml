# state-snapshotter e2e nested test cluster.
#
# 1 master + 2 workers. Two workers are enough for the snapshot flows; phase 3
# (full volume-data) attaches raw VirtualDisks to the workers at runtime via the
# storage-e2e StorageClass helper (testkit.EnsureDefaultStorageClass), so no
# per-node "additional disks" are declared here.
#
# Modules enabled here:
#   - storage-foundation  : ships the extended VolumeSnapshot fork, the
#                           VolumeCaptureRequest / VolumeRestoreRequest /
#                           VolumeSnapshotClass machinery the data leg captures and
#                           restores through, AND the volume data-transport engine
#                           (DataImport / DataExport, secure HTTP export/import of PVC
#                           contents) — absorbed from the former
#                           storage-volume-data-manager module. The upstream
#                           snapshot-controller module is NOT enabled here
#                           (state-snapshotter consumes this "extended-VS fork").
#                           Listed first (always on): the CRDs + controllers are cheap
#                           for phases 1-2; the data leg itself is only exercised in
#                           phase 3.
#   - state-snapshotter   : the module under test. enableDemoDomain ships the
#                           demo domain controller (separate pod + aggregated
#                           apiserver) and the demo CustomSnapshotDefinition.
#                           modulePullOverride defaults to the literal "main";
#                           override it for CI by exporting
#                           STATE_SNAPSHOTTER_MODULE_PULL_OVERRIDE=pr<N>/mr<N>
#                           (storage-e2e's generic <MODULE>_MODULE_PULL_OVERRIDE
#                           convention; in-YAML ${VAR} is rejected).
# The thin snapshot-capable StorageClass backends (sds-node-configurator +
# sds-local-volume) are NOT listed here: they are enabled at runtime by the phase-3
# setup (testkit.EnsureDefaultStorageClass) only when E2E_VOLUME_DATA is set, so
# phases 1-2 do not pay for them.
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      - name: "storage-foundation"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "state-snapshotter"
        version: 1
        enabled: true
        # Static default tag (must be literal - storage-e2e rejects ${VAR} here).
        # CI overrides it WITHOUT editing this file by exporting
        # STATE_SNAPSHOTTER_MODULE_PULL_OVERRIDE, e.g. "pr<N>" on GitHub, "mr<N>"
        # on GitLab (the override and the static tag are logged at config load).
        modulePullOverride: "main"
        settings:
          enableDemoDomain: true
        dependencies:
          - "storage-foundation"
