# Nested test cluster for the Snapshot export e2e.
#
# The three product modules (state-snapshotter, storage-foundation,
# storage-volume-data-manager) carry the new SnapshotExport / VRR / DataExport
# code that is not yet in main. The literal modulePullOverride below is just a
# default; point each at the branch/PR build for this run via the per-module env
# override (storage-e2e maps <MODULE>_MODULE_PULL_OVERRIDE, name upper-cased,
# non-[A-Z0-9] -> _):
#   STATE_SNAPSHOTTER_MODULE_PULL_OVERRIDE=prNNN
#   STORAGE_FOUNDATION_MODULE_PULL_OVERRIDE=prNNN
#   STORAGE_VOLUME_DATA_MANAGER_MODULE_PULL_OVERRIDE=prNNN
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic" # See internal/config/images.go
      cpu: 8
      coreFraction: 50
      ram: 8
      diskSize: 60
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 24.04 6.8.0-53-generic" # See internal/config/images.go
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 24.04 6.8.0-53-generic" # See internal/config/images.go
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      # CSI snapshot controller: needed for the residual-PVC VolumeSnapshot data leg.
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        modulePullOverride: "main"
        settings:
          enableThinProvisioning: true
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
      # DataExport / DataImport transport. Override via
      # STORAGE_VOLUME_DATA_MANAGER_MODULE_PULL_OVERRIDE.
      - name: "storage-volume-data-manager"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      # SnapshotExport CRD + controller. MUST be enabled before storage-foundation:
      # storage-foundation's module.yaml declares requirements.modules.state-snapshotter
      # (>= 0.0.0) and Deckhouse keeps it disabled ("dependency 'state-snapshotter'
      # is disabled") until state-snapshotter is up. Hence state-snapshotter depends
      # only on leaf modules here (no storage-foundation dep, which would be a cycle).
      # Override via STATE_SNAPSHOTTER_MODULE_PULL_OVERRIDE to the
      # snapshot-export-import-crs build.
      - name: "state-snapshotter"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies:
          - "snapshot-controller"
          - "storage-volume-data-manager"
      # VolumeRestoreRequest / VolumeCaptureRequest executors used by the export
      # data path. Depends on state-snapshotter to match its module.yaml
      # requirement and enable in the right order. Override to the branch/PR build
      # that carries the volumeMode VRR contract via
      # STORAGE_FOUNDATION_MODULE_PULL_OVERRIDE.
      - name: "storage-foundation"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies:
          - "state-snapshotter"
