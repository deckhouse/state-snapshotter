# state-snapshotter e2e nested test cluster.
#
# 1 master + 2 workers. Two workers are enough for the snapshot flows; phase 3
# (full volume-data) attaches raw VirtualDisks to the workers at runtime via the
# storage-e2e StorageClass helper (testkit.EnsureDefaultStorageClass), so no
# per-node "additional disks" are declared here.
#
# Modules enabled here:
#   - storage-foundation  : ships the extended VolumeSnapshot fork, the
#                           VolumeCaptureRequest / VolumeRestoreRequest /
#                           VolumeSnapshotClass machinery the data leg captures and
#                           restores through, AND the volume data-transport engine
#                           (DataImport / DataExport, secure HTTP export/import of PVC
#                           contents) — absorbed from the former
#                           storage-volume-data-manager module. The upstream
#                           snapshot-controller module is NOT enabled here
#                           (state-snapshotter consumes this "extended-VS fork").
#                           Listed first (always on): the CRDs + controllers are cheap
#                           for phases 1-2; the data leg itself is only exercised in
#                           phase 3.
#   - state-snapshotter   : the module under test (core snapshot engine + SDK).
#                           modulePullOverride defaults to the literal "main";
#                           override it for CI by exporting
#                           STATE_SNAPSHOTTER_MODULE_PULL_OVERRIDE=pr<N>/mr<N>
#                           (storage-e2e's generic <MODULE>_MODULE_PULL_OVERRIDE
#                           convention; in-YAML ${VAR} is rejected).
#   - sds-unified-snapshots-poc: reference demo domain module. Ships the demo domain
#                           controller (separate pod + aggregated apiserver), the demo
#                           CRDs and the demo CustomSnapshotDefinitions the suite
#                           captures/restores against. Depends on state-snapshotter.
#                           Override its tag via
#                           SDS_UNIFIED_SNAPSHOTS_POC_MODULE_PULL_OVERRIDE.
#   - sds-node-configurator: block-device/LVM manager on the nodes; the
#                           sds-local-volume backend requires it. Enabled here so
#                           its image is pinnable via SDS_NODE_CONFIGURATOR_MODULE_PULL_OVERRIDE.
#   - sds-local-volume    : the thin, snapshot-capable local StorageClass backend
#                           (CSI driver local.csi.storage.deckhouse.io) the phase-3
#                           data leg captures/restores through. Enabled here so its
#                           image is pinnable via SDS_LOCAL_VOLUME_MODULE_PULL_OVERRIDE
#                           (same generic <MODULE>_MODULE_PULL_OVERRIDE convention).
#                           Its module.yaml requires BOTH sds-node-configurator and
#                           storage-foundation, so it is listed as depending on both
#                           (storage-e2e enables it last, after they are Ready).
# NOTE: enabling the two SDS backends at bring-up only deploys the modules (they
# reach Ready with no StorageClass yet). The actual storage provisioning (node
# labels, LVMVolumeGroups, LocalStorageClass, the wired VolumeSnapshotClass) still
# happens at runtime in the phase-3 setup (testkit.EnsureDefaultStorageClass), only
# when E2E_VOLUME_DATA is set — so phases 1-2 still do not provision volumes.
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      - name: "storage-foundation"
        version: 1
        enabled: true
        modulePullOverride: "main"
        # storage-foundation requires state-snapshotter (module.yaml
        # requirements.modules.state-snapshotter): Deckhouse holds it off until
        # state-snapshotter is enabled+Ready. This ordering MUST match module.yaml,
        # otherwise SF is "turned off: dependency 'state-snapshotter' is disabled"
        # and the e2e module-enable step deadlocks.
        dependencies:
          - "state-snapshotter"
      - name: "state-snapshotter"
        version: 1
        enabled: true
        # Static default tag (must be literal - storage-e2e rejects ${VAR} here).
        # CI overrides it WITHOUT editing this file by exporting
        # STATE_SNAPSHOTTER_MODULE_PULL_OVERRIDE, e.g. "pr<N>" on GitHub, "mr<N>"
        # on GitLab (the override and the static tag are logged at config load).
        modulePullOverride: "main"
        # No module dependency: state-snapshotter comes up first and tolerates
        # storage-foundation's CRDs (VolumeCaptureRequest, extended VolumeSnapshot)
        # being absent at startup — the VCR watch is added dynamically once the CRD
        # becomes RESTMappable. storage-foundation then depends on this module.
        # The demo domain is no longer shipped here — it comes from the
        # sds-unified-snapshots-poc module enabled below.
        dependencies: []
      - name: "sds-unified-snapshots-poc"
        version: 1
        enabled: true
        # Reference demo domain module: provides the demo domain controller, demo CRDs
        # (sds-unified-snapshots-poc.deckhouse.io) and the two demo CSDs the suite captures
        # and restores against. Its GitLab CI publishes to the same dev registry as the
        # other modules; CI overrides the tag WITHOUT editing this file by exporting
        # SDS_UNIFIED_SNAPSHOTS_POC_MODULE_PULL_OVERRIDE (e.g. "mr<N>").
        modulePullOverride: "main"
        # Depends on state-snapshotter: the demo CSDs are CustomSnapshotDefinition
        # (group state-snapshotter.deckhouse.io) and the demo aggregated API sits under
        # subresources.sds-unified-snapshots-poc.deckhouse.io, so the core CSD CRD + core
        # aggregation layer must be live first. (module.yaml declares no requirements.modules,
        # so this dependency graph is what enforces the ordering in e2e.)
        dependencies:
          - "state-snapshotter"
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        # Static default tag; CI overrides WITHOUT editing this file by exporting
        # SDS_NODE_CONFIGURATOR_MODULE_PULL_OVERRIDE=pr<N>/mr<N>.
        modulePullOverride: "main"
        # No module requirements (module.yaml: only a deckhouse version floor).
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        # Static default tag; CI overrides WITHOUT editing this file by exporting
        # SDS_LOCAL_VOLUME_MODULE_PULL_OVERRIDE=pr<N>/mr<N>.
        modulePullOverride: "main"
        # sds-local-volume/module.yaml requires BOTH sds-node-configurator and
        # storage-foundation; Deckhouse holds it off until both are enabled+Ready.
        # This ordering MUST list both, otherwise SLV is "turned off: dependency
        # '...' is disabled" and the e2e module-enable step deadlocks (same failure
        # mode as the earlier storage-foundation/state-snapshotter inversion).
        dependencies:
          - "sds-node-configurator"
          - "storage-foundation"
